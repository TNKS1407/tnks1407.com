<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>対称性とガウス面 ── 面積で割れば、場が出る</title>
<style>
  :root{
    --bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;
    --teal:#3c7876;--red:#c2543d;--amber:#c9761f;
    --text:#1d1b17;--muted:#7d7568;--faint:#aaa49b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:'Zen Kaku Gothic New',system-ui,sans-serif;background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;overflow:hidden;}
  #stage{flex:1;position:relative;min-height:0;}
  canvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab;}
  canvas:active{cursor:grabbing;}
  /* hint sits at the BOTTOM-left so it never collides with the top-right readout */
  .hint{position:absolute;left:10px;bottom:8px;right:10px;font-size:.7rem;color:var(--faint);pointer-events:none;
    font-family:'JetBrains Mono',monospace;line-height:1.5;}
  .readout{position:absolute;right:8px;top:8px;font-size:.66rem;color:var(--muted);text-align:right;
    font-family:'JetBrains Mono',monospace;line-height:1.6;pointer-events:none;background:rgba(250,248,244,.9);
    border:1px solid var(--border);border-radius:6px;padding:.3rem .5rem;white-space:nowrap;}
  .readout b{color:var(--text);font-weight:700;}
  .readout .e{color:var(--red);font-weight:700;}
  .readout .f{color:var(--teal);font-weight:700;}
  .ctrl{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:.6rem .8rem;
    display:flex;flex-wrap:wrap;gap:.7rem 1.1rem;align-items:center;}
  .row{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--muted);}
  .row label{font-weight:700;color:var(--text);white-space:nowrap;}
  input[type=range]{width:130px;accent-color:var(--teal);}
  button{font:inherit;font-size:.76rem;font-weight:700;color:var(--text);background:var(--card);
    border:1px solid var(--border);border-radius:8px;padding:.32rem .7rem;cursor:pointer;}
  button:hover{border-color:var(--teal);}
  button.on{background:var(--teal);color:#fff;border-color:var(--teal);}
  .legend{font-size:.7rem;color:var(--muted);display:flex;gap:.9rem;flex-wrap:wrap;align-items:center;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="readout" id="ro"></div>
  <div class="hint" id="hint">対称性を選ぶと、合うガウス面が立体で立ち上がる。ドラッグで回せる。</div>
</div>
<div class="ctrl">
  <div class="row">
    <label>対称性</label>
    <button id="m0" class="on">点 → 球</button>
    <button id="m1">線 → 円柱</button>
    <button id="m2">面 → 箱</button>
  </div>
  <div class="row">
    <label id="rlab">半径 r</label>
    <input id="r" type="range" min="40" max="150" step="1" value="100" />
  </div>
  <div class="legend">
    <span style="color:var(--red)">■ 電荷</span>
    <span style="color:var(--teal)">▦ ガウス面／効く面は塗り</span>
    <span style="color:var(--text)">→ 場 E</span>
  </div>
</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const ro=document.getElementById('ro'), hintEl=document.getElementById('hint'), rlab=document.getElementById('rlab');
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
let mode=0, R=100, R0=100;
let yaw=0.6;
let cx=0, cyc=0, maxHalf=120;   // drawing center & max half-size (computed to fit, clear of readout)

function layout(){
  cx=W/2;
  const TOPRES=86, BOTRES=30;          // reserve top (readout) & bottom (hint)
  cyc=TOPRES + (H-TOPRES-BOTRES)/2;
  maxHalf=Math.max(60,(H-TOPRES-BOTRES)/2 - 24);
}
function proj(x,y,z){
  const dx=Math.cos(yaw)*0.55, dy=Math.sin(yaw)*0.34;
  return { X: cx + x + z*dx*30, Y: cyc - y + z*dy*30 };
}
function arrowSeg(x1,y1,x2,y2,col,w){
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=w||1.7;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(x2-9*Math.cos(a-0.4), y2-9*Math.sin(a-0.4));
  ctx.lineTo(x2-9*Math.cos(a+0.4), y2-9*Math.sin(a+0.4));
  ctx.closePath(); ctx.fill();
}
function seg(a,b){ ctx.beginPath(); ctx.moveTo(a.X,a.Y); ctx.lineTo(b.X,b.Y); ctx.stroke(); }
function poly(ps,close){ ctx.beginPath(); ctx.moveTo(ps[0].X,ps[0].Y); for(let i=1;i<ps.length;i++)ctx.lineTo(ps[i].X,ps[i].Y); if(close)ctx.closePath(); }

function draw(){
  ctx.clearRect(0,0,W,H); layout();
  ctx.font='12px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(mode===0) drawSphere();
  else if(mode===1) drawCylinder();
  else drawBox();
  updateReadout();
}

// ---------- 点 → 球 ----------
function drawSphere(){
  const r=Math.min(R, maxHalf, W*0.34);
  const g=ctx.createRadialGradient(cx-r*0.32,cyc-r*0.32,r*0.1, cx,cyc,r);
  g.addColorStop(0,'rgba(60,120,118,0.05)'); g.addColorStop(1,'rgba(60,120,118,0.22)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cyc,r,0,7); ctx.fill();
  ctx.strokeStyle='#3c7876'; ctx.lineWidth=1.7; ctx.beginPath(); ctx.arc(cx,cyc,r,0,7); ctx.stroke();
  const ry=r*Math.max(0.13, Math.abs(Math.sin(yaw))*0.5+0.13);
  const rx=r*Math.max(0.13, Math.abs(Math.cos(yaw))*0.5+0.13);
  ctx.lineWidth=1.2; ctx.strokeStyle='rgba(60,120,118,0.85)';
  ctx.beginPath(); ctx.ellipse(cx,cyc,r,ry,0,0,Math.PI); ctx.stroke();
  ctx.setLineDash([4,3]); ctx.strokeStyle='rgba(60,120,118,0.4)';
  ctx.beginPath(); ctx.ellipse(cx,cyc,r,ry,0,Math.PI,2*Math.PI); ctx.stroke();
  ctx.strokeStyle='rgba(60,120,118,0.5)';
  ctx.beginPath(); ctx.ellipse(cx,cyc,rx,r,0,0,2*Math.PI); ctx.stroke();
  ctx.setLineDash([]);
  for(let k=0;k<8;k++){ const a=k*Math.PI/4; arrowSeg(cx+Math.cos(a)*(r-19),cyc+Math.sin(a)*(r-19),cx+Math.cos(a)*(r+15),cyc+Math.sin(a)*(r+15),'#1d1b17'); }
  ctx.beginPath(); ctx.arc(cx,cyc,9,0,7); ctx.fillStyle='rgba(194,84,61,0.20)'; ctx.fill();
  ctx.strokeStyle='#c2543d'; ctx.lineWidth=1.8; ctx.stroke();
  ctx.fillStyle='#c2543d'; ctx.fillText('+',cx,cyc+1);
  ctx.fillStyle='#3c7876'; ctx.fillText('球（面積 4πr²）',cx,cyc+r+18);
}

// ---------- 線 → 円柱 ----------
function drawCylinder(){
  const r=Math.min(R, W*0.30);
  const ry=Math.max(8, r*(0.24+Math.abs(Math.sin(yaw))*0.16));
  const hh=Math.min(maxHalf-ry-6, 150);
  const topY=cyc-hh, botY=cyc+hh;
  // curved side shading
  const g=ctx.createLinearGradient(cx-r,0,cx+r,0);
  g.addColorStop(0,'rgba(60,120,118,0.22)'); g.addColorStop(0.5,'rgba(60,120,118,0.05)'); g.addColorStop(1,'rgba(60,120,118,0.22)');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.moveTo(cx-r,topY); ctx.lineTo(cx-r,botY);
  ctx.ellipse(cx,botY,r,ry,0,Math.PI,0,true); ctx.lineTo(cx+r,topY);
  ctx.ellipse(cx,topY,r,ry,0,0,Math.PI,true); ctx.closePath(); ctx.fill();
  // top cap (filled light) for solidity
  ctx.fillStyle='rgba(60,120,118,0.10)';
  ctx.beginPath(); ctx.ellipse(cx,topY,r,ry,0,0,2*Math.PI); ctx.fill();
  // side edges (effective faces)
  ctx.strokeStyle='#3c7876'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx-r,topY); ctx.lineTo(cx-r,botY); ctx.moveTo(cx+r,topY); ctx.lineTo(cx+r,botY); ctx.stroke();
  // bottom cap: front solid, back dashed
  ctx.lineWidth=1.4; ctx.strokeStyle='#3c7876';
  ctx.beginPath(); ctx.ellipse(cx,botY,r,ry,0,0,Math.PI); ctx.stroke();
  ctx.setLineDash([4,3]); ctx.strokeStyle='rgba(60,120,118,0.45)';
  ctx.beginPath(); ctx.ellipse(cx,botY,r,ry,0,Math.PI,2*Math.PI); ctx.stroke();
  // top cap rim
  ctx.strokeStyle='rgba(60,120,118,0.75)';
  ctx.beginPath(); ctx.ellipse(cx,topY,r,ry,0,0,2*Math.PI); ctx.stroke();
  ctx.setLineDash([]);
  // radial arrows
  for(const yy of [topY+hh*0.5, cyc, botY-hh*0.5]){
    arrowSeg(cx+10,yy,cx+r+15,yy,'#1d1b17'); arrowSeg(cx-10,yy,cx-r-15,yy,'#1d1b17');
  }
  // wire
  ctx.strokeStyle='#c2543d'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(cx,topY-16); ctx.lineTo(cx,botY+16); ctx.stroke();
  ctx.fillStyle='#c2543d'; ctx.textAlign='left'; ctx.fillText('+λ',cx+8,topY-8); ctx.textAlign='center';
  ctx.fillStyle='#3c7876'; ctx.fillText('円柱の側面（2πr·L）',cx,botY+ry+16);
}

// ---------- 面 → 箱 ----------
function drawBox(){
  const hw=Math.min(W*0.23,138), r=Math.min(R*0.7, maxHalf-8), dep=1.0;
  const P=(x,y,z)=>proj(x,y,z);
  const ftl=P(-hw,r,0),ftr=P(hw,r,0),fbr=P(hw,-r,0),fbl=P(-hw,-r,0);
  const btl=P(-hw,r,dep),btr=P(hw,r,dep),bbr=P(hw,-r,dep),bbl=P(-hw,-r,dep);
  // charged sheet plane (y=0)
  const s=1.3;
  const sp=[P(-hw*s,0,-0.2),P(hw*s,0,-0.2),P(hw*s,0,dep+0.2),P(-hw*s,0,dep+0.2)];
  poly(sp,true); ctx.fillStyle='rgba(194,84,61,0.13)'; ctx.fill(); ctx.strokeStyle='#c2543d'; ctx.lineWidth=1.6; ctx.stroke();
  // solid-look face fills: right side + front (subtle), then flux faces top/bottom (teal)
  poly([ftr,btr,bbr,fbr],true); ctx.fillStyle='rgba(60,120,118,0.06)'; ctx.fill();   // right side
  const faceTop=[ftl,ftr,btr,btl], faceBot=[fbl,fbr,bbr,bbl];
  for(const f of [faceTop,faceBot]){ poly(f,true); ctx.fillStyle='rgba(60,120,118,0.16)'; ctx.fill(); }
  poly([ftl,ftr,fbr,fbl],true); ctx.fillStyle='rgba(60,120,118,0.04)'; ctx.fill();   // front
  // back edges dashed
  ctx.strokeStyle='rgba(60,120,118,0.5)'; ctx.lineWidth=1.2; ctx.setLineDash([4,3]);
  poly([btl,btr,bbr,bbl],true); ctx.stroke(); seg(bbl,fbl);
  ctx.setLineDash([]);
  // front + connectors solid
  ctx.strokeStyle='#3c7876'; ctx.lineWidth=1.8;
  poly([ftl,ftr,fbr,fbl],true); ctx.stroke();
  seg(ftl,btl); seg(ftr,btr); seg(fbr,bbr);
  // perpendicular arrows up/down
  for(const xx of [-hw*0.5,0,hw*0.5]){
    const t=P(xx,r,dep*0.5), b=P(xx,-r,dep*0.5);
    arrowSeg(t.X,t.Y,t.X,t.Y-26,'#1d1b17'); arrowSeg(b.X,b.Y,b.X,b.Y+26,'#1d1b17');
  }
  ctx.fillStyle='#c2543d'; ctx.textAlign='left'; ctx.fillText('+σ',ftr.X+10,ftr.Y+12); ctx.textAlign='center';
  ctx.fillStyle='#3c7876'; ctx.fillText('箱の表と裏（2A）が効く面',cx,faceBot[0].Y+26);
}

function updateReadout(){
  const ratio=R/R0;
  if(mode===0){
    const E=1/(ratio*ratio);
    ro.innerHTML=`点：球で囲う<br>E·<b>4πr²</b> = Q/ε₀<br>→ <span class="e">E = Q/4πε₀r²</span><br>E相対 <span class="e">${E.toFixed(2)}</span> ／ ∮ <span class="f">一定</span>`;
  } else if(mode===1){
    const E=1/ratio;
    ro.innerHTML=`線：円柱で囲う<br>E·<b>2πrL</b> = λL/ε₀<br>→ <span class="e">E = λ/2πε₀r</span><br>E相対 <span class="e">${E.toFixed(2)}</span> ／ ∮ <span class="f">一定</span>`;
  } else {
    ro.innerHTML=`面：箱で囲う<br>E·<b>2A</b> = σA/ε₀<br>→ <span class="e">E = σ/2ε₀</span><br>r によらず E <span class="f">不変</span>`;
  }
}
function setMode(m){
  mode=m;
  for(let i=0;i<3;i++) document.getElementById('m'+i).classList.toggle('on',i===m);
  rlab.textContent = m===2?'箱の高さ':'半径 r';
  hintEl.textContent = m===2
    ? '箱をどれだけ広げても E は変わらない（無限平面の場は距離によらない）。ドラッグで回せる。'
    : 'ガウス面を広げると E は弱まるのに、貫く総フラックス ∮E·dA は一定。ドラッグで回せる。';
  draw();
}
document.getElementById('m0').onclick=()=>setMode(0);
document.getElementById('m1').onclick=()=>setMode(1);
document.getElementById('m2').onclick=()=>setMode(2);
document.getElementById('r').oninput=(e)=>{ R=parseFloat(e.target.value); draw(); };

let dragging=false,lastX=0;
function down(e){ dragging=true; lastX=(e.touches?e.touches[0]:e).clientX; }
function move(e){ if(!dragging)return; const x=(e.touches?e.touches[0]:e).clientX; yaw+=(x-lastX)*0.01; lastX=x; draw(); if(e.cancelable)e.preventDefault(); }
function up(){ dragging=false; }
cv.addEventListener('mousedown',down); window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
cv.addEventListener('touchstart',down,{passive:true}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',up);

function resize(){
  const st=document.getElementById('stage'); W=st.clientWidth; H=st.clientHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0); draw();
}
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
