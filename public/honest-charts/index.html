<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>同じ数字、ちがう絵 ── 図にだまされない</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;
    --teal:#3c7876;--red:#c2543d;--amber:#c9761f;
    --text:#1d1b17;--muted:#7d7568;--faint:#aaa49b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{height:100%;max-width:100%;overflow-x:hidden;}
  body{font-family:'Zen Kaku Gothic New',system-ui,sans-serif;background:var(--bg);color:var(--text);
    min-height:100%;line-height:1.6;
    background-image:radial-gradient(circle at 1px 1px,#e9e4da 1px,transparent 0);background-size:22px 22px;}
  /* ── じっくり遊ぶページの枠（pixlab 等と揃える）── */
  .wrap{max-width:1000px;margin:0 auto;padding:24px 18px 56px;}
  header{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .brand{font-weight:700;font-size:25px;line-height:1.1;font-family:'Zen Maru Gothic','Zen Kaku Gothic New',sans-serif;color:var(--text);}
  .brand .a{color:var(--teal);}
  .tag{font-size:12px;color:var(--muted);padding-bottom:3px;}
  .back{margin-left:auto;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-decoration:none;white-space:nowrap;}
  .back:hover{color:var(--teal);}
  .lead{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 18px;margin-bottom:18px;
    font-size:13px;color:#3a3a36;line-height:1.78;box-shadow:0 6px 20px -16px rgba(20,40,40,.4);}
  .lead p{margin:0 0 .55rem;} .lead p:last-child{margin-bottom:0;}
  .lead b{color:var(--text);} .lead a{color:var(--teal);font-weight:700;text-decoration:none;} .lead a:hover{text-decoration:underline;}
  .card-tool{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;
    box-shadow:0 6px 20px -16px rgba(20,40,40,.4);}
  footer{text-align:center;color:var(--faint);font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:14px;}
  #stage{position:relative;height:clamp(300px,56vh,520px);min-height:220px;min-width:0;width:100%;overflow:hidden;}
  /* ── 解説ページの iframe 埋め込み時は枠を消して、従来どおり全画面アプリに戻す ── */
  body.embed{height:100%;display:flex;flex-direction:column;overflow:hidden;background-image:none;}
  body.embed .wrap{max-width:none;margin:0;padding:0;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}
  body.embed header,body.embed .lead,body.embed footer{display:none;}
  body.embed .card-tool{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;border:none;border-radius:0;box-shadow:none;}
  body.embed #stage{flex:1 1 auto;height:auto;min-height:150px;}
  canvas{display:block;width:100%;height:100%;max-width:100%;touch-action:none;cursor:ns-resize;}
  .badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.7rem;
    font-weight:700;border-radius:999px;padding:.05rem .55rem;border:1px solid;margin-right:.4rem;}
  .badge.plain{color:var(--teal);border-color:var(--teal);background:rgba(60,120,118,.1);}
  .badge.pad{color:var(--red);border-color:var(--red);background:rgba(194,84,61,.1);}
  #info{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);
    padding:.5rem .7rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);line-height:1.7;
    overflow-wrap:anywhere;word-break:normal;}
  #info .stats{display:block;}
  #info .stats > span{margin-right:.9rem;}
  #info b{color:var(--text);}
  #info .lie{color:var(--red);font-weight:700;}
  #info .ok{color:var(--teal);font-weight:700;}
  #info .note{color:var(--faint);margin-top:.2rem;font-size:.68rem;}
  #info{min-width:0;}
  .ctrl{flex-shrink:0;min-width:0;background:var(--surface);border-top:1px solid var(--border);padding:.55rem .7rem;
    display:flex;flex-wrap:wrap;gap:.55rem .9rem;align-items:center;}
  .row{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--muted);flex:1 1 auto;min-width:170px;}
  .row.modes{flex:0 0 auto;min-width:0;}
  .row label{font-weight:700;color:var(--text);white-space:nowrap;}
  input[type=range]{flex:1 1 80px;min-width:80px;max-width:240px;accent-color:var(--red);}
  button{font:inherit;font-size:.76rem;font-weight:700;color:var(--text);background:var(--card);
    border:1px solid var(--border);border-radius:8px;padding:.32rem .7rem;cursor:pointer;}
  button:hover{border-color:var(--teal);}
  button.on{background:var(--teal);color:#fff;border-color:var(--teal);}
  .hide{display:none !important;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="a">図</span>に、だまされない</div>
    <div class="tag">同じ数字でも、絵にすると印象は変わる ── その手口を起こして見破る</div>
    <a class="back" href="/">← tnks1407</a>
  </header>
  <div class="lead">
    <p>同じ数字でも、絵にすると印象はがらりと変わる。これは、その<b>からくり</b>を自分の手で起こして、見破る目を作るための場所だよ。</p>
    <p>軸を切る・面積で盛る・二軸で重ねる・累計で隠す・切り取る・ビンを変える・対数で隠す・相関≠因果 ── <b>8つの手口</b>を、つまみで「盛って」みる。数字そのものは 1ミリも変わっていないのに、絵だけが嘘をつくのが見えるはずだ。</p>
    <p>なぜそう見えてしまうのか、まとめは <a href="/docs/honest-charts">解説（図に、だまされない）</a> に書いてある。</p>
  </div>
  <div class="card-tool">
<div id="stage">
  <canvas id="c"></canvas>
</div>
<div id="info">
  <div class="stats" id="stats"></div>
  <div class="note" id="note"></div>
</div>
<div class="ctrl">
  <div class="row modes">
    <button id="mAxis" class="on">① 軸を切る</button>
    <button id="mArea">② 面積で盛る</button>
    <button id="mDual">③ 二軸で重ねる</button>
    <button id="mCumul">④ 累計で隠す</button>
    <button id="mPick">⑤ 切り取る</button>
    <button id="mBin">⑥ ビンを変える</button>
    <button id="mLog">⑦ 対数で隠す</button>
    <button id="mCause">⑧ 相関≠因果</button>
  </div>
  <div class="row" id="rowAxis">
    <label>盛り具合</label>
    <input id="base" type="range" min="0" max="50" step="0.1" value="0" />
    <button id="axPlain">素のまま</button><button id="axLie">盛る</button>
  </div>
  <div class="row hide" id="rowArea">
    <label>盛り具合</label>
    <input id="pexp" type="range" min="0.5" max="1.6" step="0.01" value="0.5" />
    <button id="arPlain">素のまま</button><button id="arLie">盛る</button>
  </div>
  <div class="row hide" id="rowDual">
    <label>重ね具合</label>
    <input id="gdual" type="range" min="0" max="1" step="0.01" value="0" />
    <button id="duPlain">素のまま</button><button id="duLie">重ねる</button>
  </div>
  <div class="row hide" id="rowCumul">
    <label>見せ方</label>
    <input id="cumul" type="range" min="0" max="1" step="1" value="0" />
    <button id="cuPlain">月ごと（素）</button><button id="cuLie">累計にする</button>
  </div>
  <div class="row hide" id="rowPick">
    <label>切り取り位置</label>
    <input id="pickstart" type="range" min="0" max="18" step="1" value="8" />
    <button id="pkPlain">全体を見る</button><button id="pkLie">おいしく切る</button>
  </div>
  <div class="row hide" id="rowBin">
    <label>ビンの数</label>
    <input id="bins" type="range" min="3" max="18" step="1" value="12" />
    <button id="bnPlain">細かく（素）</button><button id="bnLie">粗くならす</button>
  </div>
  <div class="row hide" id="rowLog">
    <label>目盛り</label>
    <input id="logk" type="range" min="0" max="1" step="0.01" value="0" />
    <button id="lgPlain">線形（素）</button><button id="lgLie">log で隠す</button>
  </div>
  <div class="row hide" id="rowCause">
    <label>第3の原因</label>
    <input id="causek" type="range" min="0" max="1" step="1" value="1" />
    <button id="caPlain">原因を出す（素）</button><button id="caLie">隠して因果に</button>
  </div>
</div>
  </div><!-- /.card-tool -->
  <footer>tnks1407 — じっくり遊ぶ</footer>
</div><!-- /.wrap -->
<script>
if(window.self!==window.top)document.body.classList.add('embed');
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const stats=document.getElementById('stats'), note=document.getElementById('note');
function badgeHTML(plain, ratio){ return '<span class="badge '+(plain?'plain':'pad')+'">'+(plain?'素のまま':'盛り ×'+ratio.toFixed(1))+'</span>'; }
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
let mode='axis';

// ① 軸を切る ── 実っぽいデータ：四半期の売上（億円）。ほぼ横ばい（+3.8%）なのに崖に見せる
const DATA=[50.2,50.9,51.4,52.1], LABELS=['Q1','Q2','Q3','Q4'], TOP=53, AXTITLE='四半期の売上（億円）';
let base=0;
const baseEl=document.getElementById('base');

// ② 面積で盛る ── ユーザー数（万人）：A=120, B=240（実際は2倍）
const AV=[120,240], AL=['A社','B社'], ARTITLE='登録ユーザー数（万人）';
let pexp=0.5;
const pexpEl=document.getElementById('pexp');

// ③ 二軸で重ねる ── 別単位・別スケールの2本を、右軸を選んで重ね「連動」に見せる
const S1=[120,180,150,210,165,195], S2=[40,46,43,49,44,47], TL=['1月','2月','3月','4月','5月','6月'];
const S1NAME='アイスの売上（万円・左）', S2NAME='サイト訪問者（万人・右）';
let gDual=0;
const gdualEl=document.getElementById('gdual');

// ④ 累計で隠す ── 月ごとは毎月減ってるのに、累計は必ず増える
const NEW=[200,175,155,140,125,112,100,90], NEWTL=['1月','2月','3月','4月','5月','6月','7月','8月'], NEWTITLE='毎月の新規ユーザー（万人）';
let cumul=0;
const cumulEl=document.getElementById('cumul');

// ⑤ 都合よく切り取る ── 全期間は下落。窓を選べば「右肩上がり」
const PICK=[100,96,99,92,88,90,84,80,72,76,81,86,91,95,88,83,78,74,80,71,67,70,64,60];
const PICKTITLE='株価（円）', PW=6;
let pickStart=8, pickWhole=true;
const pickEl=document.getElementById('pickstart');

// ⑥ ビンの取り方 ── 同じデータでも、ビン幅で山の数が変わる（二峰↔一峰）
const BIN_DATA=[30,32,34,35,35,36,37,38,40,44,46,48,52,54,55,56,57,58,60,62], BINTITLE='点数の分布（人数）', BMIN=25, BMAX=70;
let bins=15;
const binsEl=document.getElementById('bins');

// ⑦ 対数で隠す ── 急成長を log でなだらかに見せる
const EXP=[3,5,9,16,28,50,90,160], EXPTL=['1','2','3','4','5','6','7','8'], EXPTITLE='感染者数（人）';
let logk=0;
const logkEl=document.getElementById('logk');

// ⑧ 相関≠因果 ── アイスと水難は連動。でも本当の原因は気温（第3の変数）
const CICE=[20,35,55,80,95,70,45], CDROWN=[2,4,7,11,13,9,5], CTEMP=[12,18,24,30,33,27,21], CTL=['4月','5月','6月','7月','8月','9月','10月'];
let causeShow=1;
const causekEl=document.getElementById('causek');

let plot={x:0,y:0,w:0,h:0};

function resize(){
  const vw=document.documentElement.clientWidth||window.innerWidth;
  const r=cv.getBoundingClientRect();
  W=Math.min(r.width||vw, vw);   // viewport幅でキャップ＝canvasが画面より広がらない
  H=r.height||(window.innerHeight*0.6);
  cv.style.width=W+'px';         // 表示幅をピン留め（width:100%が広がるのを防ぐ）
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  draw();
}
window.addEventListener('resize',resize);

function title(t){ ctx.fillStyle='#7d7568'; ctx.font='12px Zen Kaku Gothic New, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText(t, 12, 8); }
function draw(){ ctx.clearRect(0,0,W,H); ({axis:drawAxis,area:drawArea,dual:drawDual,cumul:drawCumul,pick:drawPick,bin:drawBin,log:drawLog,cause:drawCause}[mode]||drawAxis)(); }

function drawAxis(){
  title(AXTITLE);
  const mL=46, mR=18, mT=Math.max(30,H*0.10), mB=28;
  plot={x:mL, y:mT, w:Math.max(40,W-mL-mR), h:Math.max(40,H-mT-mB)};
  const yOf=v=> plot.y + plot.h - (v-base)/(TOP-base)*plot.h;
  ctx.strokeStyle='#e3dbd0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(plot.x,plot.y); ctx.lineTo(plot.x,plot.y+plot.h); ctx.lineTo(plot.x+plot.w,plot.y+plot.h); ctx.stroke();
  ctx.fillStyle='#7d7568'; ctx.font='10px JetBrains Mono, monospace'; ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillText(base.toFixed(0), plot.x-5, plot.y+plot.h); ctx.fillText(String(TOP), plot.x-5, plot.y);
  if(base>0.5){
    ctx.strokeStyle='#c2543d'; ctx.lineWidth=1.6; const bx=plot.x, by=plot.y+plot.h;
    ctx.beginPath(); ctx.moveTo(bx-6,by-2); ctx.lineTo(bx+6,by-6); ctx.moveTo(bx-6,by+2); ctx.lineTo(bx+6,by-2); ctx.stroke();
    ctx.fillStyle='#c2543d'; ctx.textAlign='left'; ctx.font='9px JetBrains Mono, monospace'; ctx.fillText('0でない', plot.x+3, plot.y+plot.h+14);
  }
  const n=DATA.length, gap=plot.w/n, bw=Math.min(64, gap*0.55); let hs=[];
  for(let i=0;i<n;i++){
    const cx=plot.x+gap*(i+0.5), top=yOf(DATA[i]), bot=plot.y+plot.h, h=Math.max(0,bot-top); hs.push(h);
    ctx.fillStyle = base>0.5?'rgba(194,84,61,0.8)':'rgba(60,120,118,0.8)'; ctx.fillRect(cx-bw/2, top, bw, h);
    ctx.fillStyle='#1d1b17'; ctx.font='bold 11px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(DATA[i].toFixed(1), cx, Math.max(plot.y+9, top-3));
    ctx.fillStyle='#7d7568'; ctx.font='11px Zen Kaku Gothic New, sans-serif'; ctx.textBaseline='top'; ctx.fillText(LABELS[i], cx, plot.y+plot.h+4);
  }
  const realPct=(DATA[n-1]/DATA[0]-1)*100, visRatio=hs[0]>1?hs[n-1]/hs[0]:1, plain=base<=0.5;
  stats.innerHTML=badgeHTML(plain, visRatio)+
    '<span>実際 Q1→Q4 <b>+'+realPct.toFixed(1)+'%</b></span>'+
    '<span>棒の見た目 '+(plain?'<span class="ok">そのまま</span>':'<span class="lie">×'+visRatio.toFixed(1)+'↑</span>')+'</span>';
  note.textContent='同じ数字。軸の下端を持ち上げると、たった+'+realPct.toFixed(1)+'%が右肩上がりの崖に化ける。';
}

function drawArea(){
  title(ARTITLE);
  const cy=H*0.54, n=AV.length, gap=W/n, maxV=Math.max.apply(null,AV);
  const rMax=Math.min(W*0.15, H*0.26, 74);
  const rOf=v=> rMax * Math.pow(v/maxV, pexp);
  const rA=rOf(AV[0]);
  for(let i=0;i<n;i++){
    const cx=gap*(i+0.5), r=rOf(AV[i]);
    ctx.fillStyle = pexp>0.55?'rgba(194,84,61,0.72)':'rgba(60,120,118,0.72)';
    ctx.beginPath(); ctx.arc(cx,cy,r,0,6.283); ctx.fill();
    ctx.strokeStyle = pexp>0.55?'#c2543d':'#3c7876'; ctx.lineWidth=1.4; ctx.stroke();
    // 半径を見せる：中心→右端の線＋倍率（盛りの正体＝半径を何倍にしたか）
    ctx.strokeStyle='#1d1b17'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r,cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,2.4,0,6.283); ctx.fillStyle='#1d1b17'; ctx.fill();
    ctx.fillStyle='#1d1b17'; ctx.font='10px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(i===0?'半径 r':'r×'+(r/rA).toFixed(1), cx+r/2, cy-4);
    // 値（中心の少し下）
    ctx.fillStyle='#1d1b17'; ctx.font='bold 13px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(AV[i]), cx, cy+13);
    ctx.fillStyle='#7d7568'; ctx.font='12px Zen Kaku Gothic New, sans-serif'; ctx.textBaseline='top';
    ctx.fillText(AL[i], cx, cy+rMax+10);
  }
  const realRatio=AV[1]/AV[0], radRatio=Math.pow(AV[1]/AV[0], pexp), areaRatio=Math.pow(AV[1]/AV[0], 2*pexp), plain=pexp<=0.55;
  stats.innerHTML=badgeHTML(plain, areaRatio)+
    '<span>実際 <b>×'+realRatio.toFixed(0)+'</b></span>'+
    '<span>半径 <b>×'+radRatio.toFixed(1)+'</b></span>'+
    '<span>面積 '+(plain?'<span class="ok">×'+areaRatio.toFixed(1)+'</span>':'<span class="lie">×'+areaRatio.toFixed(1)+'↑</span>')+'</span>';
  note.textContent=plain?'面積を値に比例＝半径は√2倍、B社は正しく「2倍」に見える。'
    :'半径を ×'+radRatio.toFixed(1)+' にすると、面積はその2乗の ×'+areaRatio.toFixed(1)+'。値は2倍のままなのに。';
}

function drawDual(){
  title(S1NAME+'  /  '+S2NAME);
  const mL=42, mR=42, mT=Math.max(34,H*0.13), mB=26;
  plot={x:mL,y:mT,w:Math.max(40,W-mL-mR),h:Math.max(40,H-mT-mB)};
  const n=S1.length, gap=plot.w/(n-1);
  const s1lo=Math.min.apply(null,S1), s1hi=Math.max.apply(null,S1);
  const s2lo=Math.min.apply(null,S2), s2hi=Math.max.apply(null,S2);
  const pad=(s2hi-s2lo)*0.5+0.5;
  const r2lo=(1-gDual)*0 + gDual*(s2lo-pad);
  const r2hi=(1-gDual)*(s2hi*1.7) + gDual*(s2hi+pad);
  const top=plot.y+plot.h*0.07, bot=plot.y+plot.h*0.92;
  const y1=v=> bot-(v-s1lo)/((s1hi-s1lo)||1)*(bot-top);
  const y2=v=> bot-(v-r2lo)/((r2hi-r2lo)||1)*(bot-top);
  const xOf=i=> plot.x+gap*i;
  ctx.strokeStyle='#e3dbd0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(plot.x,plot.y); ctx.lineTo(plot.x,plot.y+plot.h); ctx.lineTo(plot.x+plot.w,plot.y+plot.h); ctx.moveTo(plot.x+plot.w,plot.y); ctx.lineTo(plot.x+plot.w,plot.y+plot.h); ctx.stroke();
  ctx.font='9px JetBrains Mono, monospace'; ctx.textBaseline='middle';
  ctx.fillStyle='#3c7876'; ctx.textAlign='right'; ctx.fillText(String(s1hi), plot.x-4, top); ctx.fillText(String(s1lo), plot.x-4, bot);
  ctx.fillStyle='#c2543d'; ctx.textAlign='left'; ctx.fillText(r2hi.toFixed(0), plot.x+plot.w+4, top); ctx.fillText(r2lo.toFixed(0), plot.x+plot.w+4, bot);
  ctx.fillStyle='#7d7568'; ctx.font='10px Zen Kaku Gothic New, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=0;i<n;i++) ctx.fillText(TL[i], xOf(i), plot.y+plot.h+4);
  function line(arr,yf,col){ ctx.strokeStyle=col; ctx.lineWidth=2.4; ctx.lineJoin='round'; ctx.beginPath();
    for(let i=0;i<n;i++){const x=xOf(i),y=yf(arr[i]); i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke();
    ctx.fillStyle=col; for(let i=0;i<n;i++){ctx.beginPath();ctx.arc(xOf(i),yf(arr[i]),3,0,6.283);ctx.fill();} }
  line(S1,y1,'#3c7876'); line(S2,y2,'#c2543d');
  const plain=gDual<=0.05;
  stats.innerHTML='<span class="badge '+(plain?'plain':'pad')+'">'+(plain?'素のまま':'重ねた')+'</span>'+
    '<span>右軸 <b>'+r2lo.toFixed(0)+'–'+r2hi.toFixed(0)+'</b></span>'+
    '<span>見た目 '+(plain?'<span class="ok">別の動き</span>':'<span class="lie">ぴったり連動</span>')+'</span>';
  note.textContent=plain?'右軸を 0 から広くとると、赤（万人）は下のほうで、青とは別の動きに見える。'
    :'右軸を赤の範囲（'+r2lo.toFixed(0)+'–'+r2hi.toFixed(0)+'）だけに拡大すると、青にぴったり重なる。連動の正体は、右軸の選び方。';
}

function drawCumul(){
  const monthly = cumul<0.5;
  title(NEWTITLE+(monthly?'（月ごと）':'（累計）'));
  const mL=42, mR=14, mT=Math.max(30,H*0.12), mB=26;
  plot={x:mL,y:mT,w:Math.max(40,W-mL-mR),h:Math.max(40,H-mT-mB)};
  const n=NEW.length, gap=plot.w/n, top0=plot.y+plot.h*0.07, bot=plot.y+plot.h;
  let cum=[],s=0; for(let i=0;i<n;i++){s+=NEW[i];cum.push(s);}
  ctx.strokeStyle='#e3dbd0'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(plot.x,plot.y); ctx.lineTo(plot.x,bot); ctx.lineTo(plot.x+plot.w,bot); ctx.stroke();
  if(monthly){
    const mx=Math.max.apply(null,NEW), yOf=v=> bot-(v/mx)*(bot-top0), bw=Math.min(48,gap*0.6);
    for(let i=0;i<n;i++){ const cx=plot.x+gap*(i+0.5), y=yOf(NEW[i]);
      ctx.fillStyle='rgba(60,120,118,0.8)'; ctx.fillRect(cx-bw/2,y,bw,bot-y);
      ctx.fillStyle='#1d1b17'; ctx.font='bold 10px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(String(NEW[i]),cx,y-2);
      ctx.fillStyle='#7d7568'; ctx.font='10px Zen Kaku Gothic New, sans-serif'; ctx.textBaseline='top'; ctx.fillText(NEWTL[i],cx,bot+4); }
  } else {
    const mx=cum[n-1], yOf=v=> bot-(v/mx)*(bot-top0);
    ctx.strokeStyle='#c2543d'; ctx.lineWidth=2.6; ctx.lineJoin='round'; ctx.beginPath();
    for(let i=0;i<n;i++){const x=plot.x+gap*(i+0.5),y=yOf(cum[i]); i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke();
    ctx.fillStyle='#c2543d'; for(let i=0;i<n;i++){const x=plot.x+gap*(i+0.5),y=yOf(cum[i]);ctx.beginPath();ctx.arc(x,y,3,0,6.283);ctx.fill();}
    ctx.fillStyle='#7d7568'; ctx.font='10px Zen Kaku Gothic New, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
    for(let i=0;i<n;i++) ctx.fillText(NEWTL[i],plot.x+gap*(i+0.5),bot+4);
  }
  const declPct=(NEW[n-1]/NEW[0]-1)*100;
  stats.innerHTML='<span class="badge '+(monthly?'plain':'pad')+'">'+(monthly?'素のまま':'累計にした')+'</span>'+
    '<span>月ごと <b>'+declPct.toFixed(0)+'%/期</b></span>'+
    '<span>見た目 '+(monthly?'<span class="ok">減ってる</span>':'<span class="lie">右肩上がり↑</span>')+'</span>';
  note.textContent=monthly?'毎月の新規は '+NEW[0]+'→'+NEW[n-1]+' と減り続け（'+declPct.toFixed(0)+'%）。'
    :'同じ数字でも「累計」は足し続けるから毎月必ず増える ── 減速していても、グラフは右肩上がりに見える。';
}

function drawPick(){
  title(PICKTITLE+(pickWhole?'（全期間）':'（切り取り）'));
  const mL=40, mR=14, mT=Math.max(30,H*0.12), mB=24;
  plot={x:mL,y:mT,w:Math.max(40,W-mL-mR),h:Math.max(40,H-mT-mB)};
  const N=PICK.length, top0=plot.y+plot.h*0.08, bot=plot.y+plot.h*0.92;
  const lo=Math.min.apply(null,PICK), hi=Math.max.apply(null,PICK);
  const xOf=i=> plot.x+plot.w*i/(N-1), yOf=v=> bot-(v-lo)/((hi-lo)||1)*(bot-top0);
  ctx.strokeStyle='rgba(125,117,104,0.4)'; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.beginPath();
  for(let i=0;i<N;i++){const x=xOf(i),y=yOf(PICK[i]); i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke();
  let a=0,b=N-1; if(!pickWhole){ a=pickStart; b=Math.min(N-1,pickStart+PW); }
  ctx.strokeStyle=pickWhole?'#3c7876':'#c2543d'; ctx.lineWidth=2.8; ctx.lineJoin='round'; ctx.beginPath();
  for(let i=a;i<=b;i++){const x=xOf(i),y=yOf(PICK[i]); i===a?ctx.moveTo(x,y):ctx.lineTo(x,y);} ctx.stroke();
  ctx.fillStyle=pickWhole?'#3c7876':'#c2543d'; for(let i=a;i<=b;i++){ctx.beginPath();ctx.arc(xOf(i),yOf(PICK[i]),2.6,0,6.283);ctx.fill();}
  if(!pickWhole){ ctx.strokeStyle='rgba(194,84,61,0.35)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    ctx.strokeRect(xOf(a)-4, top0-6, xOf(b)-xOf(a)+8, bot-top0+12); ctx.setLineDash([]); }
  const fullPct=(PICK[N-1]/PICK[0]-1)*100, winPct=(PICK[b]/PICK[a]-1)*100;
  stats.innerHTML='<span class="badge '+(pickWhole?'plain':'pad')+'">'+(pickWhole?'全体':'切り取り')+'</span>'+
    '<span>全期間 <b>'+fullPct.toFixed(0)+'%</b></span>'+
    (pickWhole?'':'<span>この窓 <span class="lie">'+(winPct>=0?'+':'')+winPct.toFixed(0)+'%↑</span></span>');
  note.textContent=pickWhole?'全期間では '+PICK[0]+'→'+PICK[N-1]+'（'+fullPct.toFixed(0)+'%）の下落。'
    :'同じ株価でも、この窓だけ切り取ると '+(winPct>=0?'+':'')+winPct.toFixed(0)+'%の右肩上がり。窓を動かすと、好きな物語が選べてしまう。';
}

function drawBin(){
  title(BINTITLE);
  const mL=30,mR=14,mT=Math.max(28,H*0.1),mB=24;
  plot={x:mL,y:mT,w:Math.max(40,W-mL-mR),h:Math.max(40,H-mT-mB)};
  const k=bins, w=(BMAX-BMIN)/k, c=new Array(k).fill(0);
  BIN_DATA.forEach(v=>{ let idx=Math.floor((v-BMIN)/w); if(idx>=k)idx=k-1; if(idx<0)idx=0; c[idx]++; });
  const mx=Math.max.apply(null,c)||1, bot=plot.y+plot.h, top0=plot.y+plot.h*0.08, bw=plot.w/k;
  ctx.strokeStyle='#e3dbd0'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(plot.x,plot.y);ctx.lineTo(plot.x,bot);ctx.lineTo(plot.x+plot.w,bot); ctx.stroke();
  for(let i=0;i<k;i++){ const x=plot.x+bw*i, h=c[i]/mx*(bot-top0), y=bot-h;
    ctx.fillStyle = bins>=9?'rgba(60,120,118,0.78)':'rgba(194,84,61,0.72)'; ctx.fillRect(x+1,y,Math.max(1,bw-2),h); }
  const honest=bins>=9;
  stats.innerHTML='<span class="badge '+(honest?'plain':'pad')+'">'+(honest?'素のまま':'粗くした')+'</span>'+
    '<span>ビン <b>'+k+'</b></span>'+
    '<span>見た目 '+(honest?'<span class="ok">2つの山</span>':'<span class="lie">1つの山</span>')+'</span>';
  note.textContent=honest?'細かいビンだと、本当は山が2つ（二峰）＝2グループに分かれている、と分かる。'
    :'ビンを粗くすると、2つの山がのっぺり1つに潰れて、別の分布に見える。データは同じ。';
}

function drawLog(){
  const isLog=logk>0.5;
  title(EXPTITLE+(isLog?'（log目盛り）':'（線形目盛り）'));
  const mL=44,mR=14,mT=Math.max(30,H*0.11),mB=24;
  plot={x:mL,y:mT,w:Math.max(40,W-mL-mR),h:Math.max(40,H-mT-mB)};
  const n=EXP.length, gap=plot.w/n, hi=Math.max.apply(null,EXP), lo=Math.min.apply(null,EXP);
  const llo=Math.log(lo), lhi=Math.log(hi);
  const frac=v=> (1-logk)*(v/hi) + logk*((Math.log(v)-llo)/((lhi-llo)||1));
  const bot=plot.y+plot.h, top0=plot.y+plot.h*0.08, yOf=v=> bot-frac(v)*(bot-top0), bw=Math.min(46,gap*0.6);
  ctx.strokeStyle='#e3dbd0'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(plot.x,plot.y);ctx.lineTo(plot.x,bot);ctx.lineTo(plot.x+plot.w,bot); ctx.stroke();
  for(let i=0;i<n;i++){ const cx=plot.x+gap*(i+0.5), y=yOf(EXP[i]);
    ctx.fillStyle = isLog?'rgba(194,84,61,0.72)':'rgba(60,120,118,0.8)'; ctx.fillRect(cx-bw/2,y,bw,bot-y);
    ctx.fillStyle='#1d1b17'; ctx.font='bold 10px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(String(EXP[i]),cx,y-2);
    ctx.fillStyle='#7d7568'; ctx.font='10px Zen Kaku Gothic New, sans-serif'; ctx.textBaseline='top'; ctx.fillText(EXPTL[i],cx,bot+4); }
  const realR=hi/lo;
  stats.innerHTML='<span class="badge '+(isLog?'pad':'plain')+'">'+(isLog?'logで隠した':'素のまま')+'</span>'+
    '<span>実際 <b>×'+realR.toFixed(0)+'</b></span>'+
    '<span>見た目 '+(isLog?'<span class="lie">なだらかな坂に</span>':'<span class="ok">×'+realR.toFixed(0)+'の急増</span>')+'</span>';
  note.textContent=isLog?'log目盛りは、×'+realR.toFixed(0)+'の爆発的増加を“なだらかな坂”に見せる。指数の急増を地味にしたい時の常套手段。'
    :'線形だと、×'+realR.toFixed(0)+'の急増がそのまま崖に見える。同じ数字。';
}

function drawCause(){
  title('アイスの売上 と 水難事故（月ごと）');
  const mL=24,mR=14,mT=Math.max(34,H*0.13),mB=24;
  plot={x:mL,y:mT,w:Math.max(40,W-mL-mR),h:Math.max(40,H-mT-mB)};
  const n=CICE.length, gap=plot.w/(n-1), top0=plot.y+plot.h*0.10, bot=plot.y+plot.h*0.92;
  const norm=(arr)=>{ const lo=Math.min.apply(null,arr),hi=Math.max.apply(null,arr); return v=>(v-lo)/((hi-lo)||1); };
  const xOf=i=> plot.x+gap*i, yOf=f=> bot-f*(bot-top0);
  ctx.strokeStyle='#e3dbd0'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(plot.x,plot.y);ctx.lineTo(plot.x,bot);ctx.lineTo(plot.x+plot.w,bot); ctx.stroke();
  ctx.fillStyle='#7d7568'; ctx.font='10px Zen Kaku Gothic New, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=0;i<n;i++) ctx.fillText(CTL[i], xOf(i), bot+4);
  function line(arr,col,wd,dash){ const nf=norm(arr); ctx.strokeStyle=col; ctx.lineWidth=wd; ctx.lineJoin='round'; ctx.setLineDash(dash||[]); ctx.beginPath();
    for(let i=0;i<n;i++){const x=xOf(i),y=yOf(nf(arr[i])); i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=col; for(let i=0;i<n;i++){ctx.beginPath();ctx.arc(xOf(i),yOf(nf(arr[i])),2.6,0,6.283);ctx.fill();} }
  if(causeShow){ line(CTEMP,'#c9761f',2,[5,4]); }   // 気温（第3の原因）
  line(CICE,'#3c7876',2.6); line(CDROWN,'#c2543d',2.6);
  // legend
  ctx.font='10px Zen Kaku Gothic New, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle='#3c7876'; ctx.fillText('● アイス', plot.x+4, plot.y+8);
  ctx.fillStyle='#c2543d'; ctx.fillText('● 水難', plot.x+60, plot.y+8);
  if(causeShow){ ctx.fillStyle='#c9761f'; ctx.fillText('- - 気温', plot.x+108, plot.y+8); }
  const show=causeShow;
  stats.innerHTML='<span class="badge '+(show?'plain':'pad')+'">'+(show?'原因を出した':'因果に見せた')+'</span>'+
    '<span>アイスと水難 <b>強く連動</b></span>'+
    '<span>'+(show?'<span class="ok">共通の原因＝気温</span>':'<span class="lie">アイス→水難？</span>')+'</span>';
  note.textContent=show?'3本とも夏に山。アイスも水難も「気温」で動いてるだけ ── 直接の因果ではない（共通原因）。'
    :'気温（第3の変数）を隠すと、アイスが水難を引き起こしてるように見える。相関は、因果じゃない。';
}

function setBase(v){ base=Math.max(0,Math.min(50,v)); baseEl.value=String(base); draw(); }
baseEl.addEventListener('input',e=>setBase(parseFloat(e.target.value)));
document.getElementById('axPlain').addEventListener('click',()=>setBase(0));
document.getElementById('axLie').addEventListener('click',()=>setBase(49.6));
function setPexp(v){ pexp=Math.max(0.5,Math.min(1.6,v)); pexpEl.value=String(pexp); draw(); }
pexpEl.addEventListener('input',e=>setPexp(parseFloat(e.target.value)));
document.getElementById('arPlain').addEventListener('click',()=>setPexp(0.5));
document.getElementById('arLie').addEventListener('click',()=>setPexp(1.6));

function setGDual(v){ gDual=Math.max(0,Math.min(1,v)); gdualEl.value=String(gDual); draw(); }
gdualEl.addEventListener('input',e=>setGDual(parseFloat(e.target.value)));
document.getElementById('duPlain').addEventListener('click',()=>setGDual(0));
document.getElementById('duLie').addEventListener('click',()=>setGDual(1));

function setCumul(v){ cumul=v?1:0; cumulEl.value=String(cumul); draw(); }
cumulEl.addEventListener('input',e=>setCumul(parseFloat(e.target.value)));
document.getElementById('cuPlain').addEventListener('click',()=>setCumul(0));
document.getElementById('cuLie').addEventListener('click',()=>setCumul(1));
function setPickStart(v){ pickStart=Math.max(0,Math.min(18,Math.round(v))); pickEl.value=String(pickStart); pickWhole=false; draw(); }
pickEl.addEventListener('input',e=>setPickStart(parseFloat(e.target.value)));
document.getElementById('pkPlain').addEventListener('click',()=>{ pickWhole=true; draw(); });
document.getElementById('pkLie').addEventListener('click',()=>{ pickWhole=false; pickStart=8; pickEl.value='8'; draw(); });

function setBins(v){ bins=Math.max(3,Math.min(18,Math.round(v))); binsEl.value=String(bins); draw(); }
binsEl.addEventListener('input',e=>setBins(parseFloat(e.target.value)));
document.getElementById('bnPlain').addEventListener('click',()=>setBins(15));
document.getElementById('bnLie').addEventListener('click',()=>setBins(4));
function setLogk(v){ logk=Math.max(0,Math.min(1,v)); logkEl.value=String(logk); draw(); }
logkEl.addEventListener('input',e=>setLogk(parseFloat(e.target.value)));
document.getElementById('lgPlain').addEventListener('click',()=>setLogk(0));
document.getElementById('lgLie').addEventListener('click',()=>setLogk(1));
function setCause(v){ causeShow=v?1:0; causekEl.value=String(causeShow); draw(); }
causekEl.addEventListener('input',e=>setCause(parseFloat(e.target.value)));
document.getElementById('caPlain').addEventListener('click',()=>setCause(1));
document.getElementById('caLie').addEventListener('click',()=>setCause(0));

const MODES=['axis','area','dual','cumul','pick','bin','log','cause'],
  MBTN={axis:'mAxis',area:'mArea',dual:'mDual',cumul:'mCumul',pick:'mPick',bin:'mBin',log:'mLog',cause:'mCause'},
  MROW={axis:'rowAxis',area:'rowArea',dual:'rowDual',cumul:'rowCumul',pick:'rowPick',bin:'rowBin',log:'rowLog',cause:'rowCause'};
function setMode(m){
  mode=m;
  MODES.forEach(k=>{ document.getElementById(MBTN[k]).classList.toggle('on',k===m); document.getElementById(MROW[k]).classList.toggle('hide',k!==m); });
  cv.style.cursor = m==='axis' ? 'ns-resize' : 'default';
  draw();
}
MODES.forEach(k=> document.getElementById(MBTN[k]).addEventListener('click',()=>setMode(k)));

let drag=false;
function baseFromY(py){ const t=Math.max(0,Math.min(1,(py-plot.y)/plot.h)); return Math.round(t*50*10)/10; }
cv.addEventListener('pointerdown',e=>{ if(mode!=='axis')return; drag=true; const r=cv.getBoundingClientRect(); setBase(baseFromY(e.clientY-r.top)); cv.setPointerCapture&&cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointermove',e=>{ if(drag&&mode==='axis'){ e.preventDefault(); const r=cv.getBoundingClientRect(); setBase(baseFromY(e.clientY-r.top)); } });
window.addEventListener('pointerup',()=>{ drag=false; });

resize();
const _h=(location.hash||'').replace('#','');
if(_h.indexOf('dual')>=0){ setMode('dual'); setGDual(1); }
else if(_h.indexOf('area')>=0){ setMode('area'); setPexp(1.6); }
else if(_h.indexOf('cumul')>=0){ setMode('cumul'); setCumul(1); }
else if(_h.indexOf('pick')>=0){ setMode('pick'); pickWhole=false; pickStart=8; pickEl.value='8'; draw(); }
else if(_h.indexOf('bin')>=0){ setMode('bin'); setBins(4); }
else if(_h.indexOf('log')>=0){ setMode('log'); setLogk(1); }
else if(_h.indexOf('cause')>=0){ setMode('cause'); setCause(0); }
else { const hb=parseFloat(_h); if(!isNaN(hb)) setBase(hb); }
</script>
</body>
</html>
