<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>ToF 深度ビューア ── VL53L8CX 8×8</title>
<style>
  :root{
    --bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;
    --teal:#3c7876;--red:#c2543d;--amber:#c9761f;--blue:#2563aa;
    --text:#1d1b17;--muted:#7d7568;--faint:#aaa49b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:'Zen Kaku Gothic New',system-ui,sans-serif;background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;overflow:hidden;}
  #stage{flex:1;position:relative;min-height:0;}
  canvas{display:block;width:100%;height:100%;}
  .readout{position:absolute;right:10px;top:8px;font-size:.7rem;color:var(--muted);text-align:right;
    font-family:'JetBrains Mono',monospace;line-height:1.55;pointer-events:none;background:rgba(250,248,244,.72);
    border-radius:6px;padding:.3rem .5rem;}
  .readout b{color:var(--text);font-weight:700;}
  .badge{position:absolute;left:10px;top:8px;font-size:.72rem;font-weight:700;
    font-family:'JetBrains Mono',monospace;padding:.22rem .5rem;border-radius:6px;pointer-events:none;}
  .badge.syn{color:var(--amber);background:rgba(201,118,31,.10);}
  .badge.live{color:var(--teal);background:rgba(60,120,118,.12);}
  .ctrl{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:.55rem .8rem;
    display:flex;flex-wrap:wrap;gap:.5rem .9rem;align-items:center;}
  .row{display:flex;align-items:center;gap:.4rem;font-size:.76rem;color:var(--muted);}
  .row label{font-weight:700;white-space:nowrap;}
  button{font:inherit;font-size:.74rem;font-weight:700;color:var(--text);background:var(--card);
    border:1px solid var(--border);border-radius:8px;padding:.32rem .6rem;cursor:pointer;}
  button:hover{border-color:var(--teal);}
  button.on{background:var(--teal);color:#fff;border-color:var(--teal);}
  button.accent{border-color:var(--teal);color:var(--teal);}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .seg button{border:none;border-radius:0;}
  .seg button+button{border-left:1px solid var(--border);}
  input[type=range]{width:96px;accent-color:var(--teal);}
  .val{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text);min-width:4.4em;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="badge syn" id="badge">合成データ</div>
  <div class="readout" id="ro"></div>
</div>
<div class="ctrl">
  <button id="play" class="on">⏸ 停止</button>
  <button id="connect" class="accent">接続 (Web Serial)</button>
  <div class="row"><label>表示</label>
    <span class="seg"><button id="mSmooth" class="on">なめらか</button><button id="mBlock">ブロック</button></span></div>
  <button id="nums">数値 OFF</button>
  <div class="row"><label>レンジ</label>
    <span class="seg"><button id="rAuto" class="on">自動</button><button id="rFix">固定</button></span></div>
  <div class="row"><label>最遠</label>
    <input id="dmax" type="range" min="500" max="4000" step="100" value="2000" />
    <span class="val" id="dmaxv">2000mm</span></div>
</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const ro=document.getElementById('ro'), badge=document.getElementById('badge');
const N=8;                       // VL53L8CX = 8x8 zones
let W=0,H=0,DPR=1;
let grid=new Float32Array(N*N).fill(1500);   // distances in mm
let playing=true, smooth=true, showNums=false, rangeAuto=true, dmaxFixed=2000;
let mode='syn';                  // 'syn' | 'live'
let t=0, last=0, fps=0, frames=0, fpsT=0;
// offscreen 8x8 for smooth (bilinear via image scaling)
const off=document.createElement('canvas'); off.width=N; off.height=N;
const offc=off.getContext('2d'); const offImg=offc.createImageData(N,N);

// near->far colormap (red hot -> deep blue), 5 stops
const STOPS=[[184,29,19],[232,133,59],[233,210,74],[60,154,120],[36,59,107]];
function cmap(u){ // u in [0,1], 0=near
  u=u<0?0:u>1?1:u; const s=u*(STOPS.length-1); const i=Math.floor(s), f=s-i;
  const a=STOPS[i], b=STOPS[Math.min(i+1,STOPS.length-1)];
  return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f];
}

function resize(){
  const r=cv.getBoundingClientRect();
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=r.width; H=r.height;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

// synthetic: background plane + a moving near "hand" blob
function synth(time){
  const cx=3.5+2.6*Math.cos(time*0.9), cy=3.5+2.6*Math.sin(time*1.3);
  const bg=1500, near=230, sig=1.7;
  for(let j=0;j<N;j++)for(let i=0;i<N;i++){
    const dx=i-cx, dy=j-cy, r2=dx*dx+dy*dy;
    const g=Math.exp(-r2/(2*sig*sig));
    let d=bg-(bg-near)*g;
    d+=(Math.sin(i*12.9+j*78.2+time*7)*0.5)*22;   // mild deterministic noise
    grid[j*N+i]=d;
  }
}

function range(){
  if(!rangeAuto) return [80, dmaxFixed];
  let lo=1e9, hi=-1e9;
  for(let k=0;k<N*N;k++){ const d=grid[k]; if(d<lo)lo=d; if(d>hi)hi=d; }
  if(hi-lo<60) hi=lo+60;
  return [lo, hi];
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const pad=14, barW=20, gap=14, labelW=46;
  const avail=Math.min(W-barW-gap-labelW-pad*2, H-pad*2-22);
  const S=Math.max(40, avail);            // field square size
  const ox=pad+ (W-pad*2-barW-gap-labelW-S)/2, oy=(H-S)/2;
  const cell=S/N;
  const [lo,hi]=range();
  // fill offscreen 8x8
  for(let j=0;j<N;j++)for(let i=0;i<N;i++){
    const u=(grid[j*N+i]-lo)/(hi-lo);
    const c=cmap(u); const p=(j*N+i)*4;
    offImg.data[p]=c[0]; offImg.data[p+1]=c[1]; offImg.data[p+2]=c[2]; offImg.data[p+3]=255;
  }
  offc.putImageData(offImg,0,0);
  ctx.imageSmoothingEnabled=smooth;
  ctx.drawImage(off, 0,0,N,N, ox,oy,S,S);
  // grid lines (block mode) / faint cells
  if(!smooth){
    ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1;
    for(let k=0;k<=N;k++){ ctx.beginPath(); ctx.moveTo(ox+k*cell,oy); ctx.lineTo(ox+k*cell,oy+S); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox,oy+k*cell); ctx.lineTo(ox+S,oy+k*cell); ctx.stroke(); }
  }
  ctx.strokeStyle='#cfc7b9'; ctx.lineWidth=1.4; ctx.strokeRect(ox-.5,oy-.5,S+1,S+1);
  // numbers
  if(showNums){
    ctx.font=`${Math.max(8,Math.min(13,cell*0.32))}px JetBrains Mono, monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(let j=0;j<N;j++)for(let i=0;i<N;i++){
      const d=grid[j*N+i]; const u=(d-lo)/(hi-lo);
      ctx.fillStyle = u<0.5 ? 'rgba(255,255,255,.92)' : 'rgba(30,27,23,.78)';
      ctx.fillText(Math.round(d), ox+(i+.5)*cell, oy+(j+.5)*cell);
    }
  }
  // colorbar (near top -> far bottom)
  const bx=ox+S+gap, by=oy, bh=S;
  for(let y=0;y<bh;y++){ const u=y/bh; const c=cmap(u);
    ctx.fillStyle=`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; ctx.fillRect(bx,by+y,barW,1); }
  ctx.strokeStyle='#cfc7b9'; ctx.lineWidth=1; ctx.strokeRect(bx-.5,by-.5,barW+1,bh+1);
  ctx.fillStyle='var(--muted)'; ctx.fillStyle='#7d7568';
  ctx.font='10px JetBrains Mono, monospace'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('近 '+Math.round(lo)+'mm', bx+barW+6, by+6);
  ctx.fillText('遠 '+Math.round(hi)+'mm', bx+barW+6, by+bh-6);
  ctx.fillText((((lo+hi)/2)|0)+'', bx+barW+6, by+bh/2);
  // readout
  let lo2=1e9,hi2=-1e9; const ci=grid[(3*N+3)]; let cc=(grid[3*N+3]+grid[3*N+4]+grid[4*N+3]+grid[4*N+4])/4;
  for(let k=0;k<N*N;k++){const d=grid[k]; if(d<lo2)lo2=d; if(d>hi2)hi2=d;}
  ro.innerHTML='中心 <b>'+Math.round(cc)+'</b> mm<br>最小 '+Math.round(lo2)+' / 最大 '+Math.round(hi2)+'<br>'+
    (mode==='syn'?'合成':'実機')+' · <b>'+fps.toFixed(0)+'</b> fps';
}

function tick(now){
  if(!last)last=now; const dt=(now-last)/1000; last=now;
  if(playing && mode==='syn'){ t+=dt; synth(t); }
  frames++; fpsT+=dt; if(fpsT>=0.5){ fps=frames/fpsT; frames=0; fpsT=0; }
  draw();
  requestAnimationFrame(tick);
}

// ---- Web Serial (live mode) ----
let port=null, keepReading=false, lineBuf='', numBuf=[];
function feedFrame(arr){ for(let k=0;k<N*N;k++) grid[k]=arr[k]; }
function parseStream(text){
  lineBuf+=text;
  let nl;
  while((nl=lineBuf.indexOf('\n'))>=0){
    const line=lineBuf.slice(0,nl); lineBuf=lineBuf.slice(nl+1);
    const nums=line.split(/[,\s]+/).map(Number).filter(v=>!Number.isNaN(v));
    for(const v of nums){ numBuf.push(v); if(numBuf.length>=N*N){ feedFrame(numBuf.slice(0,N*N)); numBuf=[]; } }
  }
}
async function connect(){
  if(!('serial' in navigator)){ alertSafe('このブラウザは Web Serial 非対応（Chrome/Edge を全画面で）'); return; }
  try{
    port=await navigator.serial.requestPort();
    await port.open({baudRate:115200});
    mode='live'; badge.textContent='実機 (live)'; badge.className='badge live';
    document.getElementById('connect').textContent='切断';
    keepReading=true; readLoop();
  }catch(e){ /* user cancelled or failed */ }
}
async function readLoop(){
  const dec=new TextDecoderStream(); const closed=port.readable.pipeTo(dec.writable).catch(()=>{});
  const reader=dec.readable.getReader();
  try{ while(keepReading){ const {value,done}=await reader.read(); if(done)break; if(value)parseStream(value); } }
  catch(e){}
  finally{ try{reader.releaseLock();}catch(e){} }
}
async function disconnect(){
  keepReading=false; try{ await port.close(); }catch(e){}
  port=null; mode='syn'; badge.textContent='合成データ'; badge.className='badge syn';
  document.getElementById('connect').textContent='接続 (Web Serial)';
}
function alertSafe(m){ ro.innerHTML=m; }

// ---- UI ----
function seg(onId, offId, set){ document.getElementById(onId).classList.add('on'); document.getElementById(offId).classList.remove('on'); set(); }
document.getElementById('play').addEventListener('click',e=>{ playing=!playing; e.target.textContent=playing?'⏸ 停止':'▶ 再生'; e.target.classList.toggle('on',playing); });
document.getElementById('connect').addEventListener('click',()=>{ port?disconnect():connect(); });
document.getElementById('mSmooth').addEventListener('click',()=>seg('mSmooth','mBlock',()=>smooth=true));
document.getElementById('mBlock').addEventListener('click',()=>seg('mBlock','mSmooth',()=>smooth=false));
document.getElementById('nums').addEventListener('click',e=>{ showNums=!showNums; e.target.textContent='数値 '+(showNums?'ON':'OFF'); e.target.classList.toggle('on',showNums); });
document.getElementById('rAuto').addEventListener('click',()=>seg('rAuto','rFix',()=>rangeAuto=true));
document.getElementById('rFix').addEventListener('click',()=>seg('rFix','rAuto',()=>rangeAuto=false));
document.getElementById('dmax').addEventListener('input',e=>{ dmaxFixed=+e.target.value; document.getElementById('dmaxv').textContent=dmaxFixed+'mm'; });
window.addEventListener('resize',resize);
resize(); synth(0); requestAnimationFrame(tick);
</script>
</body>
</html>
