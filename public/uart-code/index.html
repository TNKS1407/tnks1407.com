<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>UART をコードで ── 開く・書く・読む</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{--bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;--teal:#3c7876;--red:#c2543d;--amber:#c9761f;--blue:#2563aa;--purple:#7a5ea8;--text:#1d1b17;--muted:#7d7568;--faint:#aaa49b;}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;max-width:100%;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;background-image:radial-gradient(circle at 1px 1px,#e9e4da 1px,transparent 0);background-size:22px 22px;}
.wrap{max-width:820px;margin:0 auto;padding:20px 16px 48px;}
header{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.brand{font-weight:700;font-size:22px;line-height:1.1;color:var(--text);}.brand .a{color:var(--teal);}
.tag{font-size:12px;color:var(--muted);padding-bottom:2px;}
.lead{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:16px;font-size:13px;color:#3a3a36;line-height:1.78;box-shadow:0 6px 20px -16px rgba(20,40,40,.4);}
.lead p{margin:0;}.lead b{color:var(--text);}
.card-tool{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 6px 20px -16px rgba(20,40,40,.4);}
.stephead{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;border-bottom:1px solid var(--border);background:var(--surface);}
.stepno{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;color:#fff;background:var(--teal);border-radius:999px;padding:.18rem .6rem;white-space:nowrap;}
.steptitle{font-weight:700;font-size:.92rem;color:var(--text);}
.code{background:#fbf8f2;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.85;overflow-x:auto;border-bottom:1px solid var(--border);}
.ln{display:block;white-space:pre;border-left:3px solid transparent;padding-left:8px;margin-left:-8px;transition:background .2s,opacity .2s,border-color .2s;border-radius:0 4px 4px 0;opacity:.42;}
.ln.on{opacity:1;background:rgba(60,120,118,.10);border-left-color:var(--teal);}
.ln.base{opacity:.8;}
.kw{color:#7a5ea8;}.fn{color:#2563aa;}.str{color:#3c7876;}.num{color:#c9761f;}.cm{color:#aaa49b;font-style:italic;}
.expl{padding:.7rem .9rem;font-size:.82rem;color:#3a3a36;line-height:1.75;background:var(--surface);border-bottom:1px solid var(--border);min-height:3.6rem;}
.expl b{color:var(--text);}.expl code{font-family:'JetBrains Mono',monospace;background:#efe9df;border-radius:3px;padding:0 4px;color:var(--blue);}
.ctrl{flex-shrink:0;background:var(--surface);padding:.5rem .7rem;display:flex;gap:.5rem;align-items:center;}
.dots{display:flex;gap:.3rem;align-items:center;}.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:.15s;}.dot.on{background:var(--teal);transform:scale(1.3);}
button{font-family:'Zen Kaku Gothic New',sans-serif;font-size:.78rem;font-weight:700;color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.32rem .8rem;cursor:pointer;transition:.15s;}
button:hover{border-color:var(--teal);}button.pri{background:var(--teal);color:#fff;border-color:var(--teal);}button:disabled{opacity:.4;cursor:default;}
footer{text-align:center;color:var(--faint);font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:12px;}
body.embed{height:100%;display:flex;flex-direction:column;overflow:auto;background-image:none;}
body.embed .wrap{max-width:none;margin:0;padding:0;}
body.embed header,body.embed .lead,body.embed footer{display:none;}
body.embed .card-tool{border:none;border-radius:0;box-shadow:none;}
</style>
</head>
<body>
<div class="wrap">
  <header><div class="brand"><span class="a">UART</span> をコードで</div><div class="tag">君が書くのは「開く・書く・読む」だけ ── 波形はハードの中</div></header>
  <div class="lead"><p>波形の話のあとで、実際のコードを見ると安心する。Python の <b>pyserial</b> で、さっきの 'A' を送って受け取るコードは、たった数行だ。<b>start/stop の枠付けも、波形にして送り出すのも、受信側のサンプリングも、全部 UART ハードが自動でやる。</b>1行ずつ見ていこう。</p></div>
  <div class="card-tool">
    <div class="stephead"><span class="stepno" id="stepno">STEP 1 / 4</span><span class="steptitle" id="steptitle">—</span></div>
    <div class="code" id="code"></div>
    <div class="expl" id="expl"></div>
    <div class="ctrl"><button id="bPrev">◀ 戻る</button><button id="bNext" class="pri">次へ ▶</button><div class="dots" id="dots"></div></div>
  </div>
  <footer>ブラックボックスを開く — シリアルの実装</footer>
</div>
<script>
if(window.self!==window.top)document.body.classList.add('embed');
(function(){
  var LINES=[
    {h:'<span class="kw">import</span> serial',base:1},
    {h:'',base:1},
    {h:'<span class="cm"># ① ポートを開く ── 速さと形式を約束する</span>',s:'1'},
    {h:'ser = serial.<span class="fn">Serial</span>(<span class="str">&#39;/dev/ttyUSB0&#39;</span>, <span class="num">9600</span>,',s:'1'},
    {h:'                    bytesize=<span class="num">8</span>, parity=<span class="str">&#39;N&#39;</span>, stopbits=<span class="num">1</span>)  <span class="cm"># = &quot;8N1&quot;</span>',s:'1'},
    {h:'',base:1},
    {h:'<span class="cm"># ② バイトを送る</span>',s:'2'},
    {h:'ser.<span class="fn">write</span>(<span class="str">b&#39;A&#39;</span>)          <span class="cm"># &#39;A&#39; = 0x41。start/stop はハードが自動で付ける</span>',s:'2'},
    {h:'',base:1},
    {h:'<span class="cm"># ③ バイトを受け取る</span>',s:'3'},
    {h:'data = ser.<span class="fn">read</span>(<span class="num">1</span>)       <span class="cm"># 1バイト来るまで待つ</span>',s:'3'},
    {h:'<span class="fn">print</span>(data)             <span class="cm"># b&#39;A&#39;</span>',s:'3'},
    {h:'',base:1},
    {h:'ser.<span class="fn">close</span>()',s:'4'}
  ];
  var STEPS=[
    {t:'ポートを開く', expl:'まず<b>約束</b>を決める ── どのポートを、どの速さ（<code>9600</code> baud）で、どんな形式（<code>8N1</code>＝8データ・パリティ無し・stop 1ビット）で話すか。<b>両側でここが合っていないと、文字化けする</b>。クロック線を共有しない UART は、この“事前の取り決め”が命だ。'},
    {t:'バイトを送る', expl:'送るのは <code>b&#39;A&#39;</code>（= 0x41）を <code>write</code> に渡すだけ。<b>start ビット・stop ビットの枠付けも、波形にしてボーレートで送り出すのも、UART ハードが自動でやる</b>。君はバイトを手渡すだけでいい。'},
    {t:'バイトを受け取る', expl:'<code>read(1)</code> で1バイト読む（来るまで待つ）。その裏で受信ハードが、<b>start の下りエッジを見つけて、各ビットの真ん中でサンプルして</b>、バイトに組み立てている ── さっき波形 widget で見た、あの動きそのものだ。'},
    {t:'＝ 開く・書く・読む、だけ', expl:'使い終わったら閉じる。── 結局、君が書くのは <b>開く・書く・読む</b> の3つだけ。タイミングも波形もハードの中に隠れているけど、<b>隠れているだけで、魔法じゃない</b>。中で何が起きてるかは、もう波形で見たとおりだよ。'}
  ];
  var step=0;
  var codeEl=document.getElementById('code'),explEl=document.getElementById('expl');
  var stepno=document.getElementById('stepno'),steptitle=document.getElementById('steptitle'),dotsEl=document.getElementById('dots');
  var bPrev=document.getElementById('bPrev'),bNext=document.getElementById('bNext');
  LINES.forEach(function(L){var d=document.createElement('span');d.className='ln'+(L.base?' base':'');d.dataset.s=L.s||'';d.innerHTML=L.h||' ';codeEl.appendChild(d);});
  for(var i=0;i<4;i++){var dt=document.createElement('span');dt.className='dot';dt.addEventListener('click',(function(x){return function(){step=x;render();};})(i));dotsEl.appendChild(dt);}
  function render(){
    var S=String(step+1);
    stepno.textContent='STEP '+(step+1)+' / 4';steptitle.textContent=STEPS[step].t;
    Array.prototype.forEach.call(codeEl.children,function(ln){var s=ln.dataset.s||'';ln.classList.toggle('on',s.indexOf(S)>=0);});
    explEl.innerHTML=STEPS[step].expl;
    bPrev.disabled=(step===0);bNext.disabled=(step===3);
    for(var i=0;i<dotsEl.children.length;i++)dotsEl.children[i].classList.toggle('on',i===step);
  }
  bPrev.addEventListener('click',function(){if(step>0){step--;render();}});
  bNext.addEventListener('click',function(){if(step<3){step++;render();}});
  render();
})();
</script>
</body>
</html>
