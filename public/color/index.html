<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>色空間ビューア — Color Space Explorer</title>
<style>
  :root{
    --bg:#15151b;--panel:rgba(28,28,36,0.86);--border:#3a3a46;
    --text:#e8e4dc;--muted:#a59f95;--accent:#5fc8c2;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--bg);
    font-family:'Zen Kaku Gothic New',system-ui,sans-serif;color:var(--text);}
  #app{position:fixed;inset:0;}
  canvas{display:block;}
  .panel{
    position:fixed;top:14px;left:14px;width:280px;max-width:calc(100vw - 28px);
    background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--border);border-radius:14px;padding:14px 16px;
    font-size:13px;max-height:calc(100vh - 28px);overflow-y:auto;
  }
  .panel h1{font-size:15px;font-weight:700;margin-bottom:2px;}
  .panel .sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:12px;}
  .row{margin:11px 0;}
  .row label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .row label b{color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600;}
  input[type=range]{width:100%;accent-color:var(--accent);}
  .checks{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:10px;}
  .checks label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text);cursor:pointer;}
  .bgbtns{display:flex;gap:6px;}
  .bgbtns button{flex:1;padding:5px 0;font-size:12px;background:#2a2a33;color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:inherit;}
  .bgbtns button:hover{border-color:var(--accent);color:var(--accent);}
  .note{font-size:11px;color:var(--muted);line-height:1.65;margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
  .note b{color:var(--accent);}
  .hint{position:fixed;bottom:12px;right:14px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;background:var(--panel);padding:6px 10px;border-radius:8px;border:1px solid var(--border);}
  a.back{color:var(--accent);text-decoration:none;font-size:11px;font-family:'JetBrains Mono',monospace;}
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<div id="app"></div>
<div class="panel">
  <h1>色空間ビューア</h1>
  <div class="sub">HSL 色立体 / 中立軸 / 色相環 S¹</div>

  <div class="row">
    <label>見る明度 L <b id="lv">0.50</b></label>
    <input type="range" id="l" min="2" max="98" value="50">
  </div>
  <div class="row">
    <label>ねじれ（ベゾルト・ブリュッケ） <b id="tv">0.00</b></label>
    <input type="range" id="t" min="0" max="100" value="0">
  </div>
  <div class="row">
    <label>中立軸のゆがみ <b id="wv">0.00</b></label>
    <input type="range" id="w" min="0" max="100" value="0">
  </div>
  <div class="checks">
    <label><input type="checkbox" id="cSolid" checked> 色立体</label>
    <label><input type="checkbox" id="cAxis" checked> 中立軸</label>
    <label><input type="checkbox" id="cRing" checked> 色相環</label>
    <label><input type="checkbox" id="cSlice"> スライス面</label>
    <label><input type="checkbox" id="cRound"> 丸み（球状）</label>
  </div>
  <div class="row" style="margin-top:12px;">
    <label>背景</label>
    <div class="bgbtns">
      <button data-bg="0x15151b">暗</button>
      <button data-bg="0x000000">黒</button>
      <button data-bg="0xffffff">白</button>
      <button data-bg="0x808080">灰</button>
    </div>
  </div>
  <div class="note" id="note"></div>
  <div class="note" style="border:0;padding-top:8px;"><a class="back" href="https://tnks1407.com">← tnks1407.com に戻る</a></div>
</div>
<div class="hint">ドラッグ=回転 / ホイール=ズーム</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151b);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 100);
camera.position.set(2.6, 1.5, 2.6);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
app.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.target.set(0,0,0);

const R = 1.0, Hgt = 2.0;
let lsel = 0.5, twist = 0, warp = 0, round = false;
let showSolid=true, showAxis=true, showRing=true, showSlice=false;

// 断面プロファイル：bicone=1-|2l-1|（HSL正規） / round=√(1-(2l-1)²)（球状）
function maxChroma(l){ const u=2*l-1; return round ? Math.sqrt(Math.max(0,1-u*u)) : (1 - Math.abs(u)); }
function centerOffset(l){ return warp * Math.sin(Math.PI*l) * 0.55 * R; } // 中立軸の横ずれ
function hueAngle(h, l){ return h*2*Math.PI + twist*(l-0.5)*2*Math.PI; }   // ねじれ込みの色相角

let cloud, axisLine, axisDots, ring, slice;
const col = new THREE.Color();

function buildCloud(){
  if(cloud){ scene.remove(cloud); cloud.geometry.dispose(); cloud.material.dispose(); }
  const Nh=64, Ns=11, Nl=34;
  const pos=[], colr=[];
  for(let li=0; li<Nl; li++){
    const l = li/(Nl-1);
    const mc = maxChroma(l), off = centerOffset(l), y=(l-0.5)*Hgt;
    for(let si=0; si<Ns; si++){
      const s = si/(Ns-1);
      const rad = s*mc*R;
      const hsteps = si===0 ? 1 : Nh;       // 中心(s=0)は1点でよい
      for(let hi=0; hi<hsteps; hi++){
        const h = hi/Nh;
        const a = hueAngle(h, l);
        pos.push(off + rad*Math.cos(a), y, rad*Math.sin(a));
        col.setHSL(h, s, l); colr.push(col.r, col.g, col.b);
      }
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(colr,3));
  const m = new THREE.PointsMaterial({ size:0.045, vertexColors:true, sizeAttenuation:true });
  cloud = new THREE.Points(g, m); cloud.visible = showSolid; scene.add(cloud);
}

function buildAxis(){
  if(axisLine){ scene.remove(axisLine); axisLine.geometry.dispose(); axisLine.material.dispose(); }
  if(axisDots){ scene.remove(axisDots); axisDots.geometry.dispose(); axisDots.material.dispose(); }
  const pts=[];
  for(let i=0;i<=40;i++){ const l=i/40; pts.push(new THREE.Vector3(centerOffset(l), (l-0.5)*Hgt, 0)); }
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  axisLine=new THREE.Line(g, new THREE.LineBasicMaterial({ color:0xece8e0 }));
  axisLine.visible=showAxis; scene.add(axisLine);
  // 黒(下)・白(上)の玉
  const dg=new THREE.SphereGeometry(0.045,16,16);
  axisDots=new THREE.Group();
  const black=new THREE.Mesh(dg, new THREE.MeshBasicMaterial({color:0x000000}));
  black.position.set(centerOffset(0), -Hgt/2, 0);
  const white=new THREE.Mesh(dg, new THREE.MeshBasicMaterial({color:0xffffff}));
  white.position.set(centerOffset(1), Hgt/2, 0);
  axisDots.add(black, white); axisDots.visible=showAxis; scene.add(axisDots);
}

function buildRing(){
  if(ring){ scene.remove(ring); ring.geometry.dispose(); ring.material.dispose(); }
  const mc=maxChroma(lsel);
  if(mc<=0.001){ ring=null; return; }
  const major=mc*R, off=centerOffset(lsel), y=(lsel-0.5)*Hgt;
  const tg=new THREE.TorusGeometry(major, 0.03, 12, 100);
  // 頂点ごとに色相で着色（大円まわりの角度＝色相）
  const p=tg.attributes.position; const c=[];
  for(let i=0;i<p.count;i++){
    const ang=Math.atan2(p.getY(i), p.getX(i));   // -π..π (トーラスはxy面)
    let h=ang/(2*Math.PI); if(h<0)h+=1;
    col.setHSL(h, 1, lsel); c.push(col.r,col.g,col.b);
  }
  tg.setAttribute('color', new THREE.Float32BufferAttribute(c,3));
  ring=new THREE.Mesh(tg, new THREE.MeshBasicMaterial({ vertexColors:true }));
  ring.rotation.x = Math.PI/2;                    // xz面に寝かせる
  ring.rotation.y = twist*(lsel-0.5)*2*Math.PI;   // ねじれ反映
  ring.position.set(off, y, 0);
  ring.visible=showRing; scene.add(ring);
}

function buildSlice(){
  if(slice){ scene.remove(slice); slice.traverse(o=>{ if(o.geometry)o.geometry.dispose(); if(o.material)o.material.dispose(); }); }
  const mc=Math.max(maxChroma(lsel)*R, 0.01);
  slice=new THREE.Group();
  const disk=new THREE.Mesh(new THREE.CircleGeometry(mc*1.05, 64),
    new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.16, side:THREE.DoubleSide, depthWrite:false }));
  const rim=new THREE.Mesh(new THREE.RingGeometry(mc*1.02, mc*1.08, 64),
    new THREE.MeshBasicMaterial({ color:0x5fc8c2, transparent:true, opacity:0.9, side:THREE.DoubleSide, depthWrite:false }));
  slice.add(disk, rim);
  slice.rotation.x=-Math.PI/2;
  slice.position.set(centerOffset(lsel),(lsel-0.5)*Hgt,0);
  slice.visible=showSlice; scene.add(slice);
}

function rebuildGeom(){ buildCloud(); buildAxis(); }      // warp/twist で立体・軸を作り直し
function rebuildSlice(){ buildRing(); buildSlice(); }     // lsel/twist/warp でリング・面

function note(){
  const el=document.getElementById('note');
  let s='<b>中立軸</b>＝グレーの芯。色相＝軸まわりの角度、彩度＝軸からの距離、明度＝高さ。';
  if(warp>0.01) s+=' <b>ゆがみ</b>で軸が曲がり、立体がそれに串刺しでついてくる。';
  if(twist>0.01) s+=' <b>ねじれ</b>＝明度ごとに色相が回る＝色相環が螺旋にねじれる＝ベゾルト・ブリュッケ効果。';
  el.innerHTML=s;
}

buildCloud(); buildAxis(); buildRing(); buildSlice(); note();

function bind(id, fn){ document.getElementById(id).addEventListener('input', fn); }
bind('l', e=>{ lsel=+e.target.value/100; document.getElementById('lv').textContent=lsel.toFixed(2); rebuildSlice(); });
bind('t', e=>{ twist=+e.target.value/100; document.getElementById('tv').textContent=twist.toFixed(2); rebuildGeom(); rebuildSlice(); note(); });
bind('w', e=>{ warp=+e.target.value/100; document.getElementById('wv').textContent=warp.toFixed(2); rebuildGeom(); rebuildSlice(); note(); });
function chk(id, set){ document.getElementById(id).addEventListener('change', e=>{ set(e.target.checked); }); }
chk('cSolid', v=>{ showSolid=v; if(cloud)cloud.visible=v; });
chk('cAxis', v=>{ showAxis=v; if(axisLine)axisLine.visible=v; if(axisDots)axisDots.visible=v; });
chk('cRing', v=>{ showRing=v; if(ring)ring.visible=v; });
chk('cSlice', v=>{ showSlice=v; if(slice)slice.visible=v; });
chk('cRound', v=>{ round=v; rebuildGeom(); rebuildSlice(); });
document.querySelectorAll('.bgbtns button').forEach(b=>{
  b.addEventListener('click', ()=>{ scene.background = new THREE.Color(parseInt(b.dataset.bg)); });
});

addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();
</script>
</body>
</html>
