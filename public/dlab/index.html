<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>伝達行列でフォルマントを解く — |D(f)| ソルバ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;
    --accent:#3c7876;--amber:#c9761f;--red:#c2543d;
    --text:#1d1b17;--text-muted:#7d7568;--text-faint:#aaa49b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Zen Kaku Gothic New','Hiragino Sans','Meiryo',system-ui,sans-serif;line-height:1.7;}
  .wrap{max-width:760px;margin:0 auto;padding:14px 14px 22px;}
  section{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:14px 16px 16px;box-shadow:0 1px 6px rgba(29,27,23,.05);}
  .w-title{font-size:1rem;font-weight:700;margin:0 0 .2rem;}
  .w-sub{font-size:.78rem;color:var(--text-muted);margin:0 0 .8rem;line-height:1.6;}
  canvas{display:block;width:100%;border:1px solid var(--border);border-radius:10px;background:var(--surface);}
  .controls{display:flex;flex-wrap:wrap;gap:.5rem 1rem;align-items:center;margin-top:.9rem;}
  .cg{display:flex;align-items:center;gap:.5rem;}
  .cg label{font-size:.74rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted);white-space:nowrap;}
  .cg input[type=range]{width:110px;accent-color:var(--accent);}
  .cg .v{font-size:.74rem;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600;min-width:2ch;}
  .btn{padding:.3rem .7rem;border:1px solid var(--border);border-radius:7px;background:none;
    font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--text-muted);cursor:pointer;transition:.15s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  #areas{display:flex;flex-wrap:wrap;gap:.4rem .7rem;margin-top:.7rem;padding-top:.7rem;border-top:1px solid var(--border);}
  #areas .ag{display:flex;flex-direction:column;align-items:center;gap:.15rem;}
  #areas .ag label{font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--text-faint);}
  #areas .ag input[type=range]{width:62px;accent-color:var(--accent);}
  .readout{margin-top:.7rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text);
    background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.55rem .8rem;line-height:1.9;}
  .readout b{color:var(--accent);} .readout .f{color:var(--red);font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <section>
    <div class="w-title">伝達行列でフォルマントを解く — <span style="font-family:'JetBrains Mono',monospace;">|D(f)|</span> の谷を探す</div>
    <p class="w-sub">声道を N 個の輪切りにして、各輪切りの 2×2 行列を声帯側から唇側へ掛け算する。その積の右下成分が D(f)。周波数 f を掃いて <b>|D(f)| が谷になる所＝共鳴＝フォルマント</b>（赤）。下の断面積スライダを動かすと、谷が動く。一様にすると 500/1500/2500 Hz が出る。</p>
    <canvas id="cv" width="720" height="380"></canvas>
    <div class="controls">
      <div class="cg"><label>輪切り数 N</label><input type="range" id="nN" min="2" max="6" step="1" value="4"><span class="v" id="nN-v">4</span></div>
      <button class="btn on" id="p-flat">一様（中性）</button>
      <button class="btn" id="p-a">前が広い</button>
      <button class="btn" id="p-i">前が狭い</button>
    </div>
    <div id="areas"></div>
    <div class="readout" id="read"></div>
  </section>
</div>

<script>
(function(){
  var TEAL='#3c7876', AMBER='#c9761f', RED='#c2543d', MUT='#7d7568', FAINT='#cfc9be', SURF='#faf8f4';
  var C=35000, L=17.5;            // 音速 cm/s、声道長 cm（→ 一様で c/4L=500Hz）
  var cv=document.getElementById('cv'), ctx=cv.getContext('2d'), W=cv.width, H=cv.height;
  var nEl=document.getElementById('nN'), nV=document.getElementById('nN-v');
  var areasBox=document.getElementById('areas'), read=document.getElementById('read');
  var N=4, areas=[];

  // ── 複素 2×2（[m00,m01,m10,m11], 各 {re,im}）─────────────
  function cmul(a,b){ return {re:a.re*b.re-a.im*b.im, im:a.re*b.im+a.im*b.re}; }
  function cadd(a,b){ return {re:a.re+b.re, im:a.im+b.im}; }
  function cabs(a){ return Math.hypot(a.re,a.im); }
  function mm(A,B){ return [
    cadd(cmul(A[0],B[0]),cmul(A[1],B[2])), cadd(cmul(A[0],B[1]),cmul(A[1],B[3])),
    cadd(cmul(A[2],B[0]),cmul(A[3],B[2])), cadd(cmul(A[2],B[1]),cmul(A[3],B[3])) ]; }
  function sectionM(A_area, ell, k){
    var kl=k*ell, c=Math.cos(kl), s=Math.sin(kl), Z=1/A_area;   // ρc=1 → Z=1/A
    return [ {re:c,im:0}, {re:0,im:Z*s}, {re:0,im:s/Z}, {re:c,im:0} ];
  }
  function Dabs(f){
    var ell=L/N, k=2*Math.PI*f/C;
    var M=[{re:1,im:0},{re:0,im:0},{re:0,im:0},{re:1,im:0}];
    for(var i=0;i<N;i++){ M=mm(M, sectionM(areas[i],ell,k)); }
    return cabs(M[3]);          // D = M11（右下）
  }
  // ── 掃引して谷（フォルマント）を拾う ─────────────
  function solve(){
    var f0=60, f1=4500, df=3, xs=[], ys=[], maxY=0;
    for(var f=f0; f<=f1; f+=df){ var d=Dabs(f); xs.push(f); ys.push(d); if(d>maxY)maxY=d; }
    var mins=[];
    for(var i=2;i<ys.length-2;i++){
      if(ys[i]<ys[i-1] && ys[i]<=ys[i+1] && ys[i]<ys[i-2] && ys[i]<ys[i+2]){
        mins.push({f:xs[i], v:ys[i], i:i});
      }
    }
    mins.sort(function(a,b){return a.v-b.v;});
    var picked=mins.slice(0,4).sort(function(a,b){return a.f-b.f;});
    return {xs:xs, ys:ys, maxY:maxY, formants:picked};
  }

  function draw(){
    var R=solve();
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    // ── 上：声道の輪切り ──
    var tx0=14, tx1=W-14, tw=tx1-tx0, ty=14, th=104, cyT=ty+th/2;
    var aMax=Math.max.apply(null,areas);
    ctx.fillStyle=FAINT; ctx.font="10px 'JetBrains Mono',monospace"; ctx.fillText('声道（輪切り N 個）　左=声帯側  右=唇側', tx0, ty-2);
    for(var i=0;i<N;i++){
      var bx=tx0+tw*i/N, bw=tw/N, hh=(areas[i]/aMax)*(th-8);
      ctx.fillStyle='rgba(60,120,118,.20)'; ctx.strokeStyle=TEAL; ctx.lineWidth=1.3;
      ctx.fillRect(bx+1, cyT-hh/2, bw-2, hh); ctx.strokeRect(bx+1, cyT-hh/2, bw-2, hh);
      ctx.fillStyle=MUT; ctx.font="9px 'JetBrains Mono',monospace"; ctx.textAlign='center';
      ctx.fillText('M'+(i+1), bx+bw/2, cyT+th/2+10); ctx.textAlign='left';
    }
    ctx.fillStyle=MUT; ctx.font="10px 'JetBrains Mono',monospace";
    ctx.fillText('M = M1·M2·…·M'+N+' →  D = M の右下成分', tx0, ty+th+22);
    // ── 下：|D(f)| 曲線 ──
    var gx0=44, gx1=W-14, gw=gx1-gx0, gy0=170, gy1=H-26, gh=gy1-gy0;
    var f0=60, f1=4500;
    var yCap=Math.min(R.maxY, R.formants.length?R.formants[R.formants.length-1].v*40+2:R.maxY);
    yCap=Math.max(yCap, 1.2);
    // 軸
    ctx.strokeStyle='#e7e1d7'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(gx0,gy0); ctx.lineTo(gx0,gy1); ctx.lineTo(gx1,gy1); ctx.stroke();
    ctx.fillStyle=MUT; ctx.font="10px 'JetBrains Mono',monospace";
    ctx.save(); ctx.translate(12,(gy0+gy1)/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.fillText('|D(f)|',0,0); ctx.restore();
    for(var fk=1000; fk<=4000; fk+=1000){
      var xx=gx0+gw*(fk-f0)/(f1-f0);
      ctx.strokeStyle='#f0ebe2'; ctx.beginPath(); ctx.moveTo(xx,gy0); ctx.lineTo(xx,gy1); ctx.stroke();
      ctx.fillStyle=FAINT; ctx.textAlign='center'; ctx.fillText(fk, xx, gy1+14); ctx.textAlign='left';
    }
    ctx.fillStyle=FAINT; ctx.fillText('周波数 f [Hz]', gx1-70, gy1+14);
    // 曲線
    ctx.beginPath();
    for(var j=0;j<R.xs.length;j++){
      var x=gx0+gw*(R.xs[j]-f0)/(f1-f0);
      var y=gy1 - Math.min(R.ys[j],yCap)/yCap*gh;
      if(j===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=TEAL; ctx.lineWidth=2.2; ctx.stroke();
    // 谷＝フォルマント
    var labels=['F1','F2','F3','F4'];
    for(var m=0;m<R.formants.length;m++){
      var fm=R.formants[m];
      var x2=gx0+gw*(fm.f-f0)/(f1-f0);
      var y2=gy1 - Math.min(fm.v,yCap)/yCap*gh;
      ctx.strokeStyle='rgba(194,84,61,.35)'; ctx.setLineDash([3,3]); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x2,gy0); ctx.lineTo(x2,gy1); ctx.stroke(); ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(x2,y2,4.5,0,2*Math.PI); ctx.fillStyle=RED; ctx.fill();
      ctx.fillStyle=RED; ctx.font="bold 11px 'JetBrains Mono',monospace"; ctx.textAlign='center';
      ctx.fillText(labels[m]+' '+Math.round(fm.f), x2, gy0-4); ctx.textAlign='left';
    }
    // readout
    var fl=R.formants.map(function(fm,idx){ return '<span class="f">'+labels[idx]+'='+Math.round(fm.f)+'Hz</span>'; }).join('　');
    read.innerHTML='いま解けたフォルマント： '+(fl||'(谷が見つからない)')+'<br>'+
      'N='+N+' 個の輪切り（各 ℓ=L/N='+(L/N).toFixed(1)+' cm）の行列を掛けて D(f) を作り、谷を拾った。断面積の分布を変えると谷＝フォルマントが動く。';
  }

  // ── 断面積スライダ（N に応じて再生成）──
  function buildAreaSliders(){
    areasBox.innerHTML='';
    for(var i=0;i<N;i++){
      (function(idx){
        var g=document.createElement('div'); g.className='ag';
        var lab=document.createElement('label'); lab.textContent='A'+(idx+1);
        var inp=document.createElement('input'); inp.type='range'; inp.min='0.4'; inp.max='10'; inp.step='0.1'; inp.value=areas[idx];
        inp.oninput=function(){ areas[idx]=+inp.value; draw(); };
        g.appendChild(lab); g.appendChild(inp); areasBox.appendChild(g);
      })(i);
    }
  }
  function setN(n){ N=n; nV.textContent=n; if(areas.length<n){ while(areas.length<n)areas.push(4); } areas=areas.slice(0,n); buildAreaSliders(); draw(); }
  function preset(kind){
    for(var i=0;i<N;i++){
      var s=(N>1)?i/(N-1):0;                  // 0=声帯側, 1=唇側
      if(kind==='flat') areas[i]=4;
      else if(kind==='a') areas[i]=1.2+7.5*s;  // 奥狭く・前広い
      else if(kind==='i') areas[i]=8.5-7.0*s;  // 奥広く・前狭い
    }
    buildAreaSliders(); draw();
  }
  document.getElementById('p-flat').onclick=function(){ setOn(this); preset('flat'); };
  document.getElementById('p-a').onclick=function(){ setOn(this); preset('a'); };
  document.getElementById('p-i').onclick=function(){ setOn(this); preset('i'); };
  function setOn(btn){ ['p-flat','p-a','p-i'].forEach(function(id){ document.getElementById(id).classList.remove('on'); }); btn.classList.add('on'); }
  nEl.oninput=function(){ setN(+nEl.value); };

  // init（?n=・?preset= に対応：記事から特定状態を埋め込める）
  var qs=new URLSearchParams(location.search);
  var qn=parseInt(qs.get('n')); if(qn>=2&&qn<=6){ N=qn; nEl.value=qn; nV.textContent=qn; }
  for(var i=0;i<N;i++) areas.push(4);
  var qp=qs.get('preset');
  if(qp==='a'){ setOn(document.getElementById('p-a')); preset('a'); }
  else if(qp==='i'){ setOn(document.getElementById('p-i')); preset('i'); }
  else { buildAreaSliders(); draw(); }
})();
</script>
</body>
</html>
