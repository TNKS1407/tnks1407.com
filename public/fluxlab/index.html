<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>場の湧き出しを数える — フラックス・ラボ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;
    --accent:#3c7876;--amber:#c9761f;--red:#c2543d;--text:#1d1b17;--text-muted:#7d7568;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Zen Kaku Gothic New','Hiragino Sans','Meiryo',system-ui,sans-serif;line-height:1.7;}
  .wrap{max-width:760px;margin:0 auto;padding:14px 14px 22px;}
  section{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:14px 16px 16px;box-shadow:0 1px 6px rgba(29,27,23,.05);}
  .w-title{font-size:1rem;font-weight:700;margin:0 0 .2rem;}
  .w-sub{font-size:.78rem;color:var(--text-muted);margin:0 0 .8rem;line-height:1.6;}
  canvas{display:block;width:100%;max-width:520px;margin:0 auto;border:1px solid var(--border);border-radius:10px;background:var(--surface);cursor:crosshair;touch-action:none;}
  .controls{display:flex;flex-wrap:wrap;gap:.5rem .9rem;align-items:center;margin-top:.9rem;justify-content:center;}
  .cg{display:flex;align-items:center;gap:.45rem;}
  .cg label{font-size:.74rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted);white-space:nowrap;}
  .cg input[type=range]{width:120px;accent-color:var(--accent);}
  .btn{padding:.3rem .7rem;border:1px solid var(--border);border-radius:7px;background:none;
    font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-muted);cursor:pointer;transition:.15s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.red.on{background:var(--red);border-color:var(--red);}
  .readout{margin-top:.7rem;font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--text);
    background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.6rem .85rem;line-height:1.95;}
  .readout b{color:var(--accent);} .readout .r{color:var(--red);font-weight:700;} .readout .t{color:var(--accent);font-weight:700;} .readout .big{font-size:.95rem;}
</style>
</head>
<body>
<div class="wrap">
  <section>
    <div class="w-title">場の湧き出しを数える — フラックス・ラボ</div>
    <p class="w-sub">点源（＋赤／−青）が作る場の中に、<b>閉じた輪</b>を置く。輪を貫いて <b>外へ出ていく量 −（入ってくる量）＝ 正味フラックス</b>。すると ── <b>外にある源は、入った分だけ出ていくので正味ゼロ</b>。<b>輪の中にある源だけが、正味フラックスを変える</b>。輪を <b>小さく</b> すれば、その場所で湧いているか（発散）が分かる。<b>輪をドラッグで移動／スライダで大きさ／空いた所クリックで源／源クリックで±反転・ドラッグで移動</b>。</p>
    <canvas id="cv" width="520" height="360"></canvas>
    <div class="controls">
      <div class="cg"><label>輪の大きさ</label><input type="range" id="rad" min="28" max="150" step="1" value="80"></div>
      <div class="cg"><label>次に置く源</label><button class="btn red on" id="sp">＋</button><button class="btn" id="sm">−</button></div>
    </div>
    <div class="controls" style="margin-top:.5rem;">
      <div class="cg"><label>例</label><button class="btn on" id="ein">源は中</button><button class="btn" id="eout">源は外</button><button class="btn" id="epm">＋と−</button></div>
      <div class="cg"><button class="btn" id="clr">クリア</button></div>
    </div>
    <div class="readout" id="read"></div>
  </section>
</div>

<script>
(function(){
  var cv=document.getElementById('cv'), ctx=cv.getContext('2d'), W=cv.width, H=cv.height;
  var read=document.getElementById('read'), radEl=document.getElementById('rad');
  var SOFT=9, TWO_PI=2*Math.PI;
  var srcs=[], sign=+1, ring={x:W/2,y:H/2,r:80};

  function field(x,y){ var ex=0,ey=0; for(var i=0;i<srcs.length;i++){ var dx=x-srcs[i].x,dy=y-srcs[i].y,r2=dx*dx+dy*dy+SOFT*SOFT; ex+=srcs[i].q*dx/r2; ey+=srcs[i].q*dy/r2; } return {x:ex,y:ey}; }

  function stats(){
    var N=300, Phi=0, out=0, inn=0, dl=ring.r*TWO_PI/N;
    for(var k=0;k<N;k++){ var a=TWO_PI*k/N, nx=Math.cos(a), ny=Math.sin(a);
      var px=ring.x+ring.r*nx, py=ring.y+ring.r*ny, e=field(px,py), en=(e.x*nx+e.y*ny)*dl;
      Phi+=en; if(en>0)out+=en; else inn+=en; }
    var q=0; for(var i=0;i<srcs.length;i++){ var dx=srcs[i].x-ring.x, dy=srcs[i].y-ring.y; if(dx*dx+dy*dy<ring.r*ring.r) q+=srcs[i].q; }
    return {Phi:Phi/TWO_PI, out:out/TWO_PI, inn:inn/TWO_PI, q:q};
  }

  function draw(){
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#faf8f4'; ctx.fillRect(0,0,W,H);
    // field arrows
    var step=36;
    for(var y=step/2;y<H;y+=step){ for(var x=step/2;x<W;x+=step){
      var e=field(x,y), mag=Math.sqrt(e.x*e.x+e.y*e.y); if(mag<1e-7)continue;
      var ux=e.x/mag, uy=e.y/mag, L=6+15*Math.tanh(mag*420), a=0.18+0.5*Math.tanh(mag*320);
      var x2=x+ux*L, y2=y+uy*L, pa=Math.atan2(uy,ux);
      ctx.strokeStyle='rgba(120,117,104,'+a.toFixed(3)+')'; ctx.lineWidth=1.3;
      ctx.beginPath(); ctx.moveTo(x-ux*L*0.5,y-uy*L*0.5); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x2-4*Math.cos(pa-0.5),y2-4*Math.sin(pa-0.5)); ctx.lineTo(x2-4*Math.cos(pa+0.5),y2-4*Math.sin(pa+0.5)); ctx.closePath();
      ctx.fillStyle='rgba(120,117,104,'+a.toFixed(3)+')'; ctx.fill();
    }}
    // closed ring, colored by outward(teal) / inward(red) field
    var M=160;
    for(var k=0;k<M;k++){ var a0=TWO_PI*k/M, a1=TWO_PI*(k+1)/M, am=(a0+a1)/2, nx=Math.cos(am), ny=Math.sin(am);
      var e=field(ring.x+ring.r*nx, ring.y+ring.r*ny), en=e.x*nx+e.y*ny;
      var t=Math.tanh(Math.abs(en)*260), col = en>=0 ? 'rgba(60,120,118,' : 'rgba(194,84,61,';
      ctx.strokeStyle=col+(0.32+0.6*t)+')'; ctx.lineWidth=3.2;
      ctx.beginPath(); ctx.arc(ring.x,ring.y,ring.r,a0,a1); ctx.stroke();
    }
    // resize hint dot on the ring
    ctx.beginPath(); ctx.arc(ring.x+ring.r,ring.y,3.5,0,TWO_PI); ctx.fillStyle='#7d7568'; ctx.fill();
    // sources
    for(var i=0;i<srcs.length;i++){ var s=srcs[i];
      ctx.beginPath(); ctx.arc(s.x,s.y,8,0,TWO_PI); ctx.fillStyle=s.q>0?'#c2543d':'#3c7876'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font="bold 12px 'JetBrains Mono',monospace"; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(s.q>0?'+':'−',s.x,s.y+0.5); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    }
    if(srcs.length===0){ ctx.fillStyle='#aaa49b'; ctx.font="13px 'Zen Kaku Gothic New',sans-serif"; ctx.textAlign='center';
      ctx.fillText('クリックで源を置いて、輪を動かしてみて', W/2, 28); ctx.textAlign='left'; }
    var s=stats();
    var verdict = srcs.length===0 ? '源を置いてみて。' :
      (Math.abs(s.q)<0.01 ? '輪の中の源は正味ゼロ → <span class="r">正味フラックスもほぼゼロ</span>（出ていく量と入ってくる量が釣り合う）。' :
       '輪の中に正味の源がある → <b>正味フラックスがその分だけ出入りする</b>。');
    read.innerHTML =
      '<span class="big">囲んだ源の合計 ＝ <b>'+(s.q>0?'+':'')+s.q.toFixed(0)+'</b>　／　正味フラックス Φ ＝ <b>'+(s.Phi>=0?'+':'')+s.Phi.toFixed(2)+'</b>（×2π）</span><br>'+
      '出ていく量 <span class="t">'+s.out.toFixed(2)+'</span>　−　入ってくる量 <span class="r">'+s.inn.toFixed(2)+'</span>　＝　Φ '+s.Phi.toFixed(2)+'　… <b>Φ ≒ 囲んだ源</b>（これがガウスの法則）。<br>'+verdict;
  }

  // ---- interaction ----
  function P(ev){ var rc=cv.getBoundingClientRect(), sx=cv.width/rc.width, sy=cv.height/rc.height; return {x:(ev.clientX-rc.left)*sx, y:(ev.clientY-rc.top)*sy}; }
  var drag=null;
  cv.addEventListener('pointerdown',function(ev){ cv.setPointerCapture(ev.pointerId); var p=P(ev);
    for(var i=0;i<srcs.length;i++){ if(Math.hypot(p.x-srcs[i].x,p.y-srcs[i].y)<=12){ drag={t:'src',i:i,moved:false}; return; } }
    if(Math.hypot(p.x-(ring.x+ring.r),p.y-ring.y)<=12){ drag={t:'rs',moved:false}; return; }
    if(Math.hypot(p.x-ring.x,p.y-ring.y)<ring.r){ drag={t:'ring',ox:p.x-ring.x,oy:p.y-ring.y,moved:false}; return; }
    drag={t:'add',x:p.x,y:p.y,moved:false};
  });
  cv.addEventListener('pointermove',function(ev){ if(!drag)return; var p=P(ev); drag.moved=true;
    if(drag.t==='src'){ srcs[drag.i].x=p.x; srcs[drag.i].y=p.y; }
    else if(drag.t==='ring'){ ring.x=p.x-drag.ox; ring.y=p.y-drag.oy; }
    else if(drag.t==='rs'){ ring.r=Math.max(20,Math.min(170,Math.hypot(p.x-ring.x,p.y-ring.y))); radEl.value=Math.round(ring.r); }
    draw();
  });
  cv.addEventListener('pointerup',function(ev){ if(!drag)return; var p=P(ev);
    if(drag.t==='src' && !drag.moved){ srcs[drag.i].q=-srcs[drag.i].q; setPreset(''); }
    else if(drag.t==='add' && !drag.moved){ srcs.push({x:p.x,y:p.y,q:sign}); setPreset(''); }
    drag=null; draw();
  });

  function preset(name){
    ring={x:W/2,y:H/2,r:80}; radEl.value=80;
    if(name==='in') srcs=[{x:W/2,y:H/2,q:1}];
    else if(name==='out') srcs=[{x:W/2+150,y:H/2,q:1}];
    else if(name==='pm') srcs=[{x:W/2-42,y:H/2,q:1},{x:W/2+42,y:H/2,q:-1}];
    draw();
  }
  function setPreset(id){ ['ein','eout','epm'].forEach(function(b){ document.getElementById(b).classList.toggle('on',b===id); }); }
  document.getElementById('sp').onclick=function(){ sign=1; this.classList.add('on'); document.getElementById('sm').classList.remove('on'); };
  document.getElementById('sm').onclick=function(){ sign=-1; this.classList.add('on'); document.getElementById('sp').classList.remove('on'); };
  document.getElementById('ein').onclick=function(){ setPreset('ein'); preset('in'); };
  document.getElementById('eout').onclick=function(){ setPreset('eout'); preset('out'); };
  document.getElementById('epm').onclick=function(){ setPreset('epm'); preset('pm'); };
  document.getElementById('clr').onclick=function(){ srcs=[]; setPreset(''); draw(); };
  radEl.oninput=function(){ ring.r=+this.value; draw(); };

  var qs=new URLSearchParams(location.search), pz=qs.get('preset');
  if(pz==='out'){ setPreset('eout'); preset('out'); }
  else if(pz==='pm'){ setPreset('epm'); preset('pm'); }
  else preset('in');
})();
</script>
</body>
</html>
