<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 400" width="460" height="400" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ar-orange" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e0892f"/></marker>
    <marker id="ar-teal" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2f7d77"/></marker>
    <marker id="ar-gray" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6b6b6b"/></marker>
  </defs>
  <rect x="0" y="0" width="460" height="400" fill="#f5f2ec"/>
  <!-- ceiling -->
  <line x1="120" y1="46" x2="360" y2="46" stroke="#2b2b29" stroke-width="3"/>
  <g stroke="#2b2b29" stroke-width="1.4">
    <line x1="132" y1="46" x2="120" y2="34"/><line x1="160" y1="46" x2="148" y2="34"/>
    <line x1="188" y1="46" x2="176" y2="34"/><line x1="216" y1="46" x2="204" y2="34"/>
    <line x1="244" y1="46" x2="232" y2="34"/><line x1="272" y1="46" x2="260" y2="34"/>
    <line x1="300" y1="46" x2="288" y2="34"/><line x1="328" y1="46" x2="316" y2="34"/>
    <line x1="356" y1="46" x2="344" y2="34"/>
  </g>
  <!-- anchor -->
  <rect x="227" y="42" width="10" height="8" fill="#2b2b29"/>
  <!-- fixed pulley -->
  <line x1="286" y1="46" x2="286" y2="82" stroke="#2b2b29" stroke-width="2.5"/>
  <circle cx="286" cy="100" r="18" fill="#fff" stroke="#2b2b29" stroke-width="2.5"/>
  <circle cx="286" cy="100" r="2.5" fill="#2b2b29"/>
  <!-- movable pulley -->
  <circle cx="250" cy="262" r="18" fill="#fff" stroke="#2b2b29" stroke-width="2.5"/>
  <circle cx="250" cy="262" r="2.5" fill="#2b2b29"/>
  <!-- string (two parallel supports, correct wraps) -->
  <g stroke="#2b2b29" stroke-width="2.2" fill="none">
    <line x1="232" y1="50" x2="232" y2="262"/>
    <path d="M232,262 A18,18 0 0 1 268,262"/>
    <line x1="268" y1="262" x2="268" y2="100"/>
    <path d="M268,100 A18,18 0 0 0 304,100"/>
    <line x1="304" y1="100" x2="304" y2="180"/>
  </g>
  <!-- tension labels on the two supports -->
  <text x="210" y="180" font-size="14" fill="#2f7d77">T</text>
  <text x="274" y="150" font-size="14" fill="#2f7d77">T</text>
  <!-- mass m -->
  <rect x="286" y="180" width="36" height="36" rx="3" fill="#d7e3e1" stroke="#2b2b29" stroke-width="2"/>
  <text x="304" y="204" font-size="17" text-anchor="middle" fill="#2b2b29">m</text>
  <!-- mass M -->
  <line x1="250" y1="280" x2="250" y2="288" stroke="#2b2b29" stroke-width="2"/>
  <rect x="228" y="288" width="44" height="42" rx="3" fill="#cdd9d6" stroke="#2b2b29" stroke-width="2"/>
  <text x="250" y="315" font-size="18" text-anchor="middle" fill="#2b2b29">M</text>
  <!-- forces on m -->
  <line x1="304" y1="178" x2="304" y2="146" stroke="#2f7d77" stroke-width="2.6" marker-end="url(#ar-teal)"/>
  <text x="310" y="160" font-size="14" fill="#2f7d77">T</text>
  <line x1="304" y1="216" x2="304" y2="252" stroke="#6b6b6b" stroke-width="2.4" marker-end="url(#ar-gray)"/>
  <text x="311" y="242" font-size="14" fill="#5a5a5a">mg</text>
  <line x1="344" y1="210" x2="344" y2="172" stroke="#e0892f" stroke-width="2.6" marker-end="url(#ar-orange)"/>
  <text x="350" y="194" font-size="16" fill="#c9761f">a</text>
  <!-- forces on M / movable pulley -->
  <line x1="208" y1="302" x2="208" y2="262" stroke="#2f7d77" stroke-width="2.6" marker-end="url(#ar-teal)"/>
  <text x="178" y="286" font-size="14" fill="#2f7d77">2T</text>
  <line x1="250" y1="330" x2="250" y2="366" stroke="#6b6b6b" stroke-width="2.4" marker-end="url(#ar-gray)"/>
  <text x="257" y="356" font-size="14" fill="#5a5a5a">Mg</text>
  <line x1="300" y1="300" x2="300" y2="340" stroke="#e0892f" stroke-width="2.6" marker-end="url(#ar-orange)"/>
  <text x="306" y="324" font-size="16" fill="#c9761f">A</text>
  <!-- caption -->
  <text x="230" y="390" font-size="17" text-anchor="middle" fill="#3c7876">糸が伸びない → a = 2A</text>
</svg>
