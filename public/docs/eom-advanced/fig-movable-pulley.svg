<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 400" width="460" height="400" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ar-orange" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e0892f"/></marker>
    <marker id="ar-teal" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2f7d77"/></marker>
  </defs>
  <rect x="0" y="0" width="460" height="400" fill="#f5f2ec"/>
  <!-- ceiling -->
  <line x1="60" y1="46" x2="400" y2="46" stroke="#2b2b29" stroke-width="3"/>
  <g stroke="#2b2b29" stroke-width="1.4">
    <line x1="72" y1="46" x2="60" y2="34"/><line x1="100" y1="46" x2="88" y2="34"/>
    <line x1="128" y1="46" x2="116" y2="34"/><line x1="156" y1="46" x2="144" y2="34"/>
    <line x1="184" y1="46" x2="172" y2="34"/><line x1="212" y1="46" x2="200" y2="34"/>
    <line x1="240" y1="46" x2="228" y2="34"/><line x1="268" y1="46" x2="256" y2="34"/>
    <line x1="296" y1="46" x2="284" y2="34"/><line x1="324" y1="46" x2="312" y2="34"/>
    <line x1="352" y1="46" x2="340" y2="34"/><line x1="380" y1="46" x2="368" y2="34"/>
  </g>
  <!-- fixed pulley -->
  <line x1="330" y1="46" x2="330" y2="62" stroke="#2b2b29" stroke-width="2.5"/>
  <circle cx="330" cy="80" r="18" fill="#fff" stroke="#2b2b29" stroke-width="2.5"/>
  <circle cx="330" cy="80" r="2.5" fill="#2b2b29"/>
  <!-- anchor -->
  <rect x="145" y="42" width="10" height="8" fill="#2b2b29"/>
  <!-- movable pulley -->
  <circle cx="170" cy="250" r="18" fill="#fff" stroke="#2b2b29" stroke-width="2.5"/>
  <circle cx="170" cy="250" r="2.5" fill="#2b2b29"/>
  <!-- string -->
  <g stroke="#2f7d77" stroke-width="2.4" fill="none">
    <line x1="150" y1="50" x2="152" y2="232"/>
    <path d="M152,250 A18,18 0 0 0 188,250"/>
    <line x1="188" y1="232" x2="312" y2="90"/>
    <path d="M312,80 A18,18 0 0 1 348,80"/>
    <line x1="348" y1="80" x2="348" y2="150"/>
  </g>
  <!-- mass m -->
  <rect x="330" y="150" width="36" height="36" rx="3" fill="#d7e3e1" stroke="#2b2b29" stroke-width="2"/>
  <text x="348" y="174" font-size="17" text-anchor="middle" fill="#2b2b29">m</text>
  <!-- mass M -->
  <line x1="170" y1="268" x2="170" y2="278" stroke="#2b2b29" stroke-width="2"/>
  <rect x="148" y="278" width="44" height="42" rx="3" fill="#cdd9d6" stroke="#2b2b29" stroke-width="2"/>
  <text x="170" y="305" font-size="18" text-anchor="middle" fill="#2b2b29">M</text>
  <!-- accelerations -->
  <line x1="392" y1="184" x2="392" y2="140" stroke="#e0892f" stroke-width="2.6" marker-end="url(#ar-orange)"/>
  <text x="400" y="166" font-size="16" fill="#c9761f">a</text>
  <line x1="216" y1="282" x2="216" y2="322" stroke="#e0892f" stroke-width="2.6" marker-end="url(#ar-orange)"/>
  <text x="223" y="306" font-size="16" fill="#c9761f">A</text>
  <!-- tension labels -->
  <text x="356" y="120" font-size="15" fill="#2f7d77">T</text>
  <text x="92" y="246" font-size="14" fill="#2f7d77">糸2本 → 2T</text>
  <!-- caption -->
  <text x="230" y="378" font-size="17" text-anchor="middle" fill="#3c7876">糸が伸びない → a = 2A</text>
</svg>
