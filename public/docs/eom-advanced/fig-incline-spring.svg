<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ar-gray" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6b6b6b"/></marker>
    <marker id="ar-blue" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2f6db0"/></marker>
    <marker id="ar-purple" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8a5cc0"/></marker>
  </defs>
  <rect x="0" y="0" width="480" height="360" fill="#f5f2ec"/>
  <!-- incline -->
  <polygon points="70,310 410,310 410,150" fill="#ece5d8" stroke="#2b2b29" stroke-width="2.5"/>
  <!-- ground hatch -->
  <g stroke="#2b2b29" stroke-width="1.2">
    <line x1="80" y1="310" x2="68" y2="322"/><line x1="110" y1="310" x2="98" y2="322"/>
    <line x1="140" y1="310" x2="128" y2="322"/><line x1="170" y1="310" x2="158" y2="322"/>
    <line x1="200" y1="310" x2="188" y2="322"/><line x1="230" y1="310" x2="218" y2="322"/>
    <line x1="260" y1="310" x2="248" y2="322"/><line x1="290" y1="310" x2="278" y2="322"/>
    <line x1="320" y1="310" x2="308" y2="322"/><line x1="350" y1="310" x2="338" y2="322"/>
    <line x1="380" y1="310" x2="368" y2="322"/><line x1="410" y1="310" x2="398" y2="322"/>
  </g>
  <!-- angle theta -->
  <path d="M104,310 A34,34 0 0 0 101,295" fill="none" stroke="#2b2b29" stroke-width="1.6"/>
  <text x="112" y="303" font-size="15" fill="#2b2b29">θ</text>
  <!-- mass -->
  <circle cx="224" cy="222" r="13" fill="#d7e3e1" stroke="#2f7d77" stroke-width="2"/>
  <text x="224" y="227" font-size="13" text-anchor="middle" fill="#2b2b29">m</text>
  <!-- gravity -->
  <line x1="224" y1="222" x2="224" y2="300" stroke="#6b6b6b" stroke-width="2.6" marker-end="url(#ar-gray)"/>
  <text x="231" y="296" font-size="15" fill="#5a5a5a">mg</text>
  <!-- normal -->
  <line x1="224" y1="222" x2="193" y2="156" stroke="#2f6db0" stroke-width="2.6" marker-end="url(#ar-blue)"/>
  <text x="174" y="152" font-size="15" fill="#2f6db0">N</text>
  <!-- spring -->
  <line x1="224" y1="222" x2="286" y2="193" stroke="#8a5cc0" stroke-width="2.6" marker-end="url(#ar-purple)"/>
  <text x="290" y="186" font-size="15" fill="#8a5cc0">kx</text>
  <!-- gravity components (dashed) -->
  <line x1="224" y1="222" x2="177" y2="244" stroke="#9a9a9a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#ar-gray)"/>
  <text x="120" y="252" font-size="13" fill="#8a8a8a">mg sinθ</text>
  <line x1="224" y1="222" x2="250" y2="276" stroke="#9a9a9a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#ar-gray)"/>
  <text x="256" y="284" font-size="13" fill="#8a8a8a">mg cosθ</text>
  <!-- caption -->
  <text x="240" y="345" font-size="14" text-anchor="middle" fill="#3c7876">斜面方向: ma∥ = mg sinθ − kx   ／   垂直: N = mg cosθ</text>
</svg>
