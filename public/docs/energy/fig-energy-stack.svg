<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320" font-family="'Segoe UI','Hiragino Kaku Gothic ProN',system-ui,sans-serif">
  <rect x="0" y="0" width="560" height="320" fill="#f5f2ec"/>
  <!-- legend -->
  <rect x="20" y="16" width="14" height="14" rx="2" fill="#2f6db0" opacity=".75"/>
  <text x="40" y="28" font-size="13" fill="#2b2b29">位置エネルギー U</text>
  <rect x="180" y="16" width="14" height="14" rx="2" fill="#3c9a6b" opacity=".8"/>
  <text x="200" y="28" font-size="13" fill="#2b2b29">運動エネルギー K</text>

  <!-- E line (common top) -->
  <line x1="40" y1="64" x2="520" y2="64" stroke="#c98a2b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="520" y="59" font-size="13" text-anchor="end" fill="#c98a2b">E = K + U（いつも一定）</text>
  <!-- baseline -->
  <line x1="40" y1="252" x2="520" y2="252" stroke="#cfc7b6" stroke-width="1.4"/>

  <!-- snapshot 1: turning point — all U -->
  <rect x="86" y="64" width="64" height="188" fill="#2f6db0" opacity=".7"/>
  <text x="118" y="276" font-size="13" text-anchor="middle" fill="#2b2b29">折り返し点</text>
  <text x="118" y="294" font-size="11.5" text-anchor="middle" fill="#6b6b66">K=0 / すべて U</text>

  <!-- snapshot 2: midway — half U, half K -->
  <rect x="246" y="158" width="64" height="94" fill="#2f6db0" opacity=".7"/>
  <rect x="246" y="64" width="64" height="94" fill="#3c9a6b" opacity=".78"/>
  <text x="278" y="276" font-size="13" text-anchor="middle" fill="#2b2b29">途中</text>
  <text x="278" y="294" font-size="11.5" text-anchor="middle" fill="#6b6b66">U と K が混ざる</text>

  <!-- snapshot 3: bottom — all K -->
  <rect x="406" y="64" width="64" height="188" fill="#3c9a6b" opacity=".78"/>
  <text x="438" y="276" font-size="13" text-anchor="middle" fill="#2b2b29">最下点</text>
  <text x="438" y="294" font-size="11.5" text-anchor="middle" fill="#6b6b66">U=0 / すべて K</text>

  <!-- caption -->
  <text x="280" y="314" font-size="12.5" text-anchor="middle" fill="#3c7876">どの瞬間も、青(U)＋緑(K)は同じ高さ E に届く ── 入れ替わっても和は変わらない。</text>
</svg>
