<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>部屋の残響 — こだまが重なって尾になる</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;
  --teal:#3c7876;--red:#c2543d;--amber:#c9761f;--blue:#2563aa;
  --text:#1d1b17;--muted:#7d7568;--faint:#aaa49b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;max-width:100%;}
body{
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  background-image:radial-gradient(circle at 1px 1px,#e9e4da 1px,transparent 0);
  background-size:22px 22px;
}
.wrap{max-width:820px;margin:0 auto;padding:20px 16px 48px;}
header{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.brand{font-weight:700;font-size:22px;line-height:1.1;color:var(--text);}
.brand .a{color:var(--teal);}
.tag{font-size:12px;color:var(--muted);padding-bottom:2px;}
.back{margin-left:auto;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-decoration:none;white-space:nowrap;}
.back:hover{color:var(--teal);}
.lead{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:13px 16px;margin-bottom:16px;font-size:13px;color:#3a3a36;line-height:1.78;
  box-shadow:0 6px 20px -16px rgba(20,40,40,.4);}
.lead p{margin:0 0 .5rem;}.lead p:last-child{margin-bottom:0;}
.lead b{color:var(--text);}
.card-tool{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;
  box-shadow:0 6px 20px -16px rgba(20,40,40,.4);}
#stage{position:relative;width:100%;height:clamp(260px,52vw,420px);overflow:hidden;background:var(--surface);}
canvas{display:block;width:100%;height:100%;touch-action:none;}
#info{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);
  padding:.45rem .7rem;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);line-height:1.75;min-height:2.4rem;}
#info b{color:var(--text);}
#info .v-teal{color:var(--teal);font-weight:600;}
#info .v-amber{color:var(--amber);font-weight:600;}
#info .v-red{color:var(--red);font-weight:600;}
.ctrl{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);
  padding:.5rem .7rem;display:flex;flex-wrap:wrap;gap:.5rem .8rem;align-items:center;}
.cg{display:flex;align-items:center;gap:.4rem;font-size:.76rem;}
.cg label{color:var(--muted);white-space:nowrap;font-weight:500;}
.cg label b{color:var(--text);}
.cg input[type=range]{width:clamp(70px,15vw,130px);accent-color:var(--teal);}
.cg .val{font-family:'JetBrains Mono',monospace;color:var(--teal);font-size:.72rem;font-weight:600;min-width:4ch;}
button{font-family:'Zen Kaku Gothic New',sans-serif;font-size:.74rem;font-weight:700;
  color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:.28rem .65rem;cursor:pointer;transition:border-color .15s,background .15s,color .15s;}
button:hover{border-color:var(--teal);}
button.pri{background:var(--red);color:#fff;border-color:var(--red);}
button.pri:hover{background:#a83d28;}
footer{text-align:center;color:var(--faint);font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:12px;}
body.embed{height:100%;display:flex;flex-direction:column;overflow:hidden;background-image:none;}
body.embed .wrap{max-width:none;margin:0;padding:0;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}
body.embed header,body.embed .lead,body.embed footer{display:none;}
body.embed .card-tool{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;border:none;border-radius:0;box-shadow:none;}
body.embed #stage{flex:1 1 auto;height:auto;min-height:160px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="a">こだま</span>の残響</div>
    <div class="tag">こだまが1個ずつ帰ってきて、余韻が重なって「尾」になる</div>
  </header>
  <div class="lead">
    <p>手を叩くと、まず<b>直接音</b>が届く。少し遅れて、壁で跳ね返った<b>こだま</b>が1個ずつ帰ってくる ── 遅れ <b>T</b> ごとに、<b>a</b> 倍ずつ小さくなりながら。</p>
    <p>1個1個は小さくても、間隔が詰まっていると<b>余韻が重なり合って、ひと続きの「反響の尾」</b>になる。これが残響（リバーブ）だ。下の塗りつぶしが、その重なった尾。<b>a</b> を 1 に近づけると尾が長く伸び、<b>T</b> を詰めると密になる。</p>
    <p style="font-size:12px;color:var(--muted);">「♪ 鳴らす」＝音と一緒に、こだまが順に帰ってくる。「パルス」＝全部いっぺんに表示。</p>
  </div>
  <div class="card-tool">
    <div id="stage"><canvas id="cv"></canvas></div>
    <div id="info"></div>
    <div class="ctrl">
      <div class="cg">
        <label><b>a</b> 残響</label>
        <input type="range" id="aSlider" min="0.30" max="0.93" step="0.01" value="0.82" />
        <span class="val" id="aVal">0.82</span>
      </div>
      <div class="cg">
        <label><b>T</b> 間隔</label>
        <input type="range" id="tSlider" min="0.04" max="0.20" step="0.005" value="0.09" />
        <span class="val" id="tVal">0.09 s</span>
      </div>
      <button id="bPlay" class="pri">♪ 鳴らす</button>
      <button id="bPulse">パルス</button>
    </div>
  </div>
  <footer>重ね合わせ — 残響（こだまの重なり）</footer>
</div>

<script>
if(window.self!==window.top)document.body.classList.add('embed');

(function(){
  var cv=document.getElementById('cv');
  var ctx=cv.getContext('2d');
  var info=document.getElementById('info');
  var aSlider=document.getElementById('aSlider');
  var aVal=document.getElementById('aVal');
  var tSlider=document.getElementById('tSlider');
  var tVal=document.getElementById('tVal');
  var bPlay=document.getElementById('bPlay');
  var bPulse=document.getElementById('bPulse');
  var stage=document.getElementById('stage');

  var a=0.82, T=0.09, T_MAX=2.6, NMAX=90;
  var AMPMAX=1.7;
  var anim={running:false,revealed:0,startMs:0,raf:null};
  var echoes=[];

  var W=0,H=0,DPR=1;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    var rect=stage.getBoundingClientRect();
    W=Math.round(rect.width); H=Math.round(rect.height);
    cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0); draw();
  }

  function computeEchoes(){
    var arr=[];
    for(var n=0;n<NMAX;n++){
      var tn=n*T; if(tn>T_MAX)break;
      var amp=Math.pow(a,n); if(n>0 && amp<0.012)break;
      arr.push({t:tn,amp:amp});
    }
    return arr;
  }
  // 余韻つきの重なり（reverb envelope）
  function envAt(t,upto){
    var tau=T*1.4, s=0;
    for(var i=0;i<upto;i++){
      var e=echoes[i]; if(e.t>t)break;
      s+=e.amp*Math.exp(-(t-e.t)/tau);
    }
    return s;
  }

  var PAD_L=40,PAD_R=14,PAD_T=18,PAD_B=34;
  function ax(){ return {gW:W-PAD_L-PAD_R, gH:H-PAD_T-PAD_B, x0:PAD_L, y0:PAD_T, base:H-PAD_B}; }
  function yv(g,v){ return g.base - Math.min(v,AMPMAX)/AMPMAX*g.gH; }

  function draw(){
    if(!W||!H)return;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#faf8f4'; ctx.fillRect(0,0,W,H);
    var g=ax();

    // グリッド & 時間軸
    ctx.strokeStyle='#e9e3d8'; ctx.lineWidth=1;
    for(var i=0;i<=4;i++){ var yy=g.y0+Math.round(g.gH*i/4)+0.5; ctx.beginPath(); ctx.moveTo(g.x0,yy); ctx.lineTo(g.x0+g.gW,yy); ctx.stroke(); }
    ctx.strokeStyle='#c9b8a8'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(g.x0,g.base+0.5); ctx.lineTo(g.x0+g.gW,g.base+0.5); ctx.stroke();
    ctx.fillStyle='#aaa49b'; ctx.font='10px "JetBrains Mono",monospace'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    for(var tj=0;tj<=4;tj++){ ctx.fillText((T_MAX*tj/4).toFixed(1),g.x0+g.gW*tj/4,g.base+14); }
    ctx.fillStyle='#7d7568'; ctx.fillText('時間 t (s) →',g.x0+g.gW/2,g.base+26);

    echoes=computeEchoes();
    var upto = anim.running ? Math.min(anim.revealed,echoes.length) : echoes.length;

    // ---- 重なった「反響の尾」(envelope) を塗る ----
    if(upto>0){
      ctx.beginPath();
      ctx.moveTo(g.x0, g.base);
      for(var px=0;px<=g.gW;px++){
        var t=px/g.gW*T_MAX;
        var E=envAt(t,upto);
        ctx.lineTo(g.x0+px, yv(g,E));
      }
      ctx.lineTo(g.x0+g.gW, g.base); ctx.closePath();
      var grad=ctx.createLinearGradient(0,g.y0,0,g.base);
      grad.addColorStop(0,'rgba(60,120,118,0.34)'); grad.addColorStop(1,'rgba(60,120,118,0.06)');
      ctx.fillStyle=grad; ctx.fill();
      // 尾の輪郭
      ctx.beginPath();
      for(var px2=0;px2<=g.gW;px2++){ var t2=px2/g.gW*T_MAX; var sx=g.x0+px2, sy=yv(g,envAt(t2,upto)); if(px2===0)ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy); }
      ctx.strokeStyle='rgba(60,120,118,0.55)'; ctx.lineWidth=1.5; ctx.stroke();
    }

    // ---- こだまの棒（1個ずつ）----
    for(var k=0;k<upto;k++){
      var e=echoes[k];
      var ex=g.x0+e.t/T_MAX*g.gW, ey=yv(g,e.amp);
      var isDirect=(k===0), isNew=(anim.running && k===upto-1);
      ctx.strokeStyle=isDirect?'#1d1b17':(isNew?'#c9761f':'#3c7876');
      ctx.lineWidth=isDirect?3:(isNew?2.6:1.8);
      ctx.beginPath(); ctx.moveTo(ex,g.base); ctx.lineTo(ex,ey); ctx.stroke();
      // 頭の点
      ctx.fillStyle=isDirect?'#1d1b17':(isNew?'#c9761f':'#3c7876');
      ctx.beginPath(); ctx.arc(ex,ey,isDirect?4:(isNew?4:2.6),0,6.2832); ctx.fill();
      if(isNew){ ctx.save(); ctx.globalAlpha=0.4; ctx.strokeStyle='#c9761f'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(ex,ey,8,0,6.2832); ctx.stroke(); ctx.restore(); }
    }

    // 直接音ラベル
    if(upto>0){
      ctx.fillStyle='#1d1b17'; ctx.font='bold 10px "Zen Kaku Gothic New",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
      ctx.fillText('直接音',g.x0+3,yv(g,1)-7);
      if(upto>2){ var mx=g.x0+(echoes[Math.min(upto-1,echoes.length-1)].t)/T_MAX*g.gW*0.55; ctx.fillStyle='#3c7876'; ctx.fillText('こだまの尾（重なった残響）',Math.min(mx,g.x0+g.gW-150),g.y0+14); }
    }

    // 読み出し
    var n60=Math.ceil(Math.log(0.001)/Math.log(a)), t60=Math.min(n60*T,T_MAX);
    info.innerHTML='<b>直接音</b> ＋ こだま <span class="v-teal">'+Math.max(upto-1,0)+'</span> 本'+
      ' &nbsp;|&nbsp; 残響 a=<span class="v-teal">'+a.toFixed(2)+'</span>（1に近いほど長い）'+
      ' &nbsp;|&nbsp; 間隔 T=<span class="v-amber">'+T.toFixed(3)+'s</span>'+
      ' &nbsp;|&nbsp; 尾の長さ <span class="v-amber">~'+t60.toFixed(2)+'s</span>';
  }

  function showAll(){ stopAnim(); anim.running=false; draw(); }
  function stopAnim(){ if(anim.raf){cancelAnimationFrame(anim.raf);anim.raf=null;} anim.running=false; }

  function startReveal(){
    echoes=computeEchoes();
    stopAnim(); anim.running=true; anim.revealed=0; anim.startMs=performance.now();
    (function tick(){
      var el=(performance.now()-anim.startMs)/1000;
      var r=0; for(var i=0;i<echoes.length;i++){ if(echoes[i].t<=el+0.001)r=i+1; }
      anim.revealed=r; draw();
      if(r<echoes.length){ anim.raf=requestAnimationFrame(tick); }
      else{ stopAnim(); draw(); }
    })();
  }

  // ---- WebAudio：こだまを実際に鳴らす ----
  var audioCtx=null;
  function playEcho(){
    echoes=computeEchoes();
    if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ startReveal(); return; } }
    if(audioCtx.state==='suspended') audioCtx.resume();
    var now=audioCtx.currentTime;
    for(var n=0;n<echoes.length;n++){
      var tOff=echoes[n].t, amp=echoes[n].amp*0.32; if(amp<0.004)continue;
      var osc=audioCtx.createOscillator(), gn=audioCtx.createGain();
      osc.type='triangle'; osc.frequency.value=560;
      gn.gain.setValueAtTime(0,now+tOff);
      gn.gain.linearRampToValueAtTime(amp,now+tOff+0.004);
      gn.gain.exponentialRampToValueAtTime(0.0008,now+tOff+0.10);
      osc.connect(gn); gn.connect(audioCtx.destination);
      osc.start(now+tOff); osc.stop(now+tOff+0.14);
    }
    startReveal();
    bPlay.textContent='♪ 再生中…';
    var total=echoes.length?echoes[echoes.length-1].t+0.2:1;
    setTimeout(function(){ bPlay.textContent='♪ 鳴らす'; }, Math.min(total,T_MAX)*1000+250);
  }

  aSlider.addEventListener('input',function(){ a=+aSlider.value; aVal.textContent=a.toFixed(2); showAll(); });
  tSlider.addEventListener('input',function(){ T=+tSlider.value; tVal.textContent=T.toFixed(3)+' s'; showAll(); });
  bPulse.addEventListener('click',showAll);
  bPlay.addEventListener('click',playEcho);

  var ro=new ResizeObserver(function(){resize();}); ro.observe(stage);
  resize();
  showAll();
})();
</script>
</body>
</html>
