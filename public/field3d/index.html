<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>源を足して、場を作る — 3Dポテンシャル地形</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;
    --accent:#3c7876;--amber:#c9761f;--red:#c2543d;--text:#1d1b17;--text-muted:#7d7568;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Zen Kaku Gothic New','Hiragino Sans','Meiryo',system-ui,sans-serif;line-height:1.7;}
  .wrap{max-width:760px;margin:0 auto;padding:14px 14px 22px;}
  section{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:14px 16px 16px;box-shadow:0 1px 6px rgba(29,27,23,.05);}
  .w-title{font-size:1rem;font-weight:700;margin:0 0 .2rem;}
  .w-sub{font-size:.78rem;color:var(--text-muted);margin:0 0 .8rem;line-height:1.6;}
  #stage{position:relative;width:100%;max-width:560px;margin:0 auto;aspect-ratio:7/5;
    border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#f2eee7;touch-action:none;}
  #stage canvas{display:block;width:100%;height:100%;}
  .controls{display:flex;flex-wrap:wrap;gap:.5rem .9rem;align-items:center;margin-top:.9rem;justify-content:center;}
  .cg{display:flex;align-items:center;gap:.45rem;}
  .cg label{font-size:.74rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted);white-space:nowrap;}
  .cg input[type=range]{width:110px;accent-color:var(--accent);}
  .btn{padding:.3rem .7rem;border:1px solid var(--border);border-radius:7px;background:none;
    font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-muted);cursor:pointer;transition:.15s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.red.on{background:var(--red);border-color:var(--red);}
  .readout{margin-top:.7rem;font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--text);
    background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.55rem .8rem;line-height:1.85;}
  .readout b{color:var(--accent);} .readout .r{color:var(--red);font-weight:700;} .readout .t{color:var(--accent);font-weight:700;}
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<div class="wrap">
  <section>
    <div class="w-title">源を足して、場を作る — 3D ポテンシャル地形</div>
    <p class="w-sub">2Dの“地形”を、ほんとうの立体にしたもの。<b>＋の源は丘</b>、<b>−の源は井戸</b>として地面から立ち上がり、源を足すほど地形が盛り上がる／へこむ。場（力の向き）は、この地形の <b>坂</b> ── 急なところほど強い。<b>ドラッグで回転</b>、<b>空いた地面をクリックで源を追加</b>、<b>源をクリックで ＋⇄− 反転</b>。</p>
    <div id="stage"></div>
    <div class="controls">
      <div class="cg"><label>次に置く源</label><button class="btn red on" id="sp">＋</button><button class="btn" id="sm">−</button></div>
      <div class="cg"><label>高さ</label><input type="range" id="hs" min="0.5" max="2.2" step="0.1" value="1.2"></div>
    </div>
    <div class="controls" style="margin-top:.5rem;">
      <div class="cg"><label>例</label><button class="btn" id="e1">1つ</button><button class="btn on" id="e2">2つ（同符号）</button><button class="btn" id="ed">双極子 ＋−</button><button class="btn" id="e3">3つ</button></div>
      <div class="cg"><button class="btn" id="clr">クリア</button></div>
    </div>
    <div class="readout" id="read"></div>
    <p style="text-align:center;margin:.6rem 0 0;font-size:.74rem;"><a href="/field/" style="color:#3c7876;font-family:'JetBrains Mono',monospace;text-decoration:none;font-weight:600;">▶ 2D（等高線とベクトル場）で見る ↗</a></p>
  </section>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const stage = document.getElementById('stage');
const read = document.getElementById('read');
const RED=[0.76,0.33,0.24], TEAL=[0.235,0.47,0.463], SURF=[0.93,0.90,0.86];
const SOFT=0.13, TK=0.32;     // 正則化と色/高さの締め
let HSCALE=1.2;
let srcs=[], sign=+1;

// ---- three setup ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2eee7);
let W=stage.clientWidth||520, H=stage.clientHeight||372;
const camera = new THREE.PerspectiveCamera(42, W/H, 0.01, 100);
camera.position.set(2.1, 1.7, 2.3);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
stage.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=.08;
controls.minDistance=1.6; controls.maxDistance=6;
controls.maxPolarAngle=1.46; controls.target.set(0,0,0);
controls.autoRotate=true; controls.autoRotateSpeed=0.7;

scene.add(new THREE.HemisphereLight(0xffffff, 0xcfc6b8, 0.85));
const dir = new THREE.DirectionalLight(0xffffff, 0.7); dir.position.set(2.5,4,1.5); scene.add(dir);

// ground reference grid
const grid = new THREE.GridHelper(2.4, 12, 0xcfc9be, 0xe3dbd0);
grid.position.y = -0.001; scene.add(grid);

// ---- potential terrain ----
const N=80, SPAN=1.0;              // domain [-SPAN,SPAN]^2
let geom = new THREE.BufferGeometry();
const vcount=(N+1)*(N+1);
const pos = new Float32Array(vcount*3);
const col = new Float32Array(vcount*3);
const idx=[];
for(let j=0;j<N;j++){ for(let i=0;i<N;i++){
  const a=j*(N+1)+i, b=a+1, c=a+(N+1), d=c+1;
  idx.push(a,c,b, b,c,d);
}}
geom.setIndex(idx);
geom.setAttribute('position', new THREE.BufferAttribute(pos,3));
geom.setAttribute('color', new THREE.BufferAttribute(col,3));
const mat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:.9, metalness:0, side:THREE.DoubleSide, flatShading:false });
const terrain = new THREE.Mesh(geom, mat); scene.add(terrain);
const wire = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color:0x1d1b17, wireframe:true, transparent:true, opacity:0.05 }));
scene.add(wire);

const srcGroup = new THREE.Group(); scene.add(srcGroup);
const sphGeo = new THREE.SphereGeometry(0.05, 18, 14);

function phi(x,y){ let s=0; for(const o of srcs){ const dx=x-o.x, dy=y-o.y; s+=o.q/Math.sqrt(dx*dx+dy*dy+SOFT*SOFT); } return s; }
function heightAt(x,y){ return HSCALE * Math.tanh(phi(x,y)*TK); }
function colorAt(s){ const c=Math.min(1,Math.abs(s)), t=s>=0?RED:TEAL;
  return [SURF[0]+(t[0]-SURF[0])*c, SURF[1]+(t[1]-SURF[1])*c, SURF[2]+(t[2]-SURF[2])*c]; }

function rebuild(){
  let k=0;
  for(let j=0;j<=N;j++){ for(let i=0;i<=N;i++){
    const x=-SPAN+2*SPAN*i/N, y=-SPAN+2*SPAN*j/N;
    const p=phi(x,y), h=HSCALE*Math.tanh(p*TK), c=colorAt(Math.tanh(p*TK));
    pos[k]=x; pos[k+1]=h; pos[k+2]=y;
    col[k]=c[0]; col[k+1]=c[1]; col[k+2]=c[2];
    k+=3;
  }}
  geom.attributes.position.needsUpdate=true;
  geom.attributes.color.needsUpdate=true;
  geom.computeVertexNormals();
  // source markers ── 源は平面（地面）上のその位置に置く。地形に隠れないよう常に手前に描き、生じた丘/井戸へ細い柱でつなぐ
  srcGroup.clear();
  for(const o of srcs){
    const colr = o.q>0?0xc2543d:0x3c7876, h=heightAt(o.x,o.y);
    const m=new THREE.Mesh(sphGeo, new THREE.MeshBasicMaterial({ color:colr, depthTest:false }));
    m.position.set(o.x, 0, o.y); m.renderOrder=3;
    srcGroup.add(m);
    const sh=Math.abs(h);
    if(sh>0.02){
      const cyl=new THREE.Mesh(new THREE.CylinderGeometry(0.005,0.005,sh,8),
        new THREE.MeshBasicMaterial({ color:colr, transparent:true, opacity:0.55, depthTest:false }));
      cyl.position.set(o.x, h/2, o.y); cyl.renderOrder=2;
      srcGroup.add(cyl);
    }
  }
  let np=0,nm=0; for(const o of srcs){ o.q>0?np++:nm++; }
  read.innerHTML = srcs.length? (
    'いま源は <b>'+srcs.length+'個</b>（＋'+np+'・−'+nm+'）。地形の高さ ＝ 各源の 1/r を足したポテンシャル φ。<br>'+
    '<span class="r">赤い丘</span>＝＋源、<span class="t">青い谷</span>＝−源。坂が急なところほど場が強い。ボールを置けば、坂を下る向きに転がるよ。'
  ) : 'クリックで源を置いてみて（＋は丘、−は井戸）。ドラッグで回転。';
}

// ---- interaction: click to add / flip ----
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
let down=null;
function localXY(ev){ const r=stage.getBoundingClientRect();
  return { x:((ev.clientX-r.left)/r.width)*2-1, y:-((ev.clientY-r.top)/r.height)*2+1, sx:ev.clientX, sy:ev.clientY }; }
renderer.domElement.addEventListener('pointerdown', e=>{ const p=localXY(e); down={sx:p.sx,sy:p.sy,moved:false}; controls.autoRotate=false; });
renderer.domElement.addEventListener('pointermove', e=>{ if(down){ if(Math.hypot(e.clientX-down.sx, e.clientY-down.sy)>5) down.moved=true; } });
renderer.domElement.addEventListener('pointerup', e=>{
  if(!down||down.moved){ down=null; return; }
  down=null;
  const p=localXY(e); ndc.set(p.x,p.y); ray.setFromCamera(ndc, camera);
  const hit=ray.intersectObject(terrain,false);
  if(!hit.length) return;
  const x=hit[0].point.x, y=hit[0].point.z;
  // 既存の源に近ければ符号反転、そうでなければ追加
  for(const o of srcs){ if(Math.hypot(o.x-x,o.y-y)<0.12){ o.q=-o.q; setPreset(''); rebuild(); return; } }
  if(Math.abs(x)<SPAN && Math.abs(y)<SPAN){ srcs.push({x,y,q:sign}); setPreset(''); rebuild(); }
});

// ---- presets / ui ----
function preset(name){
  if(name==='1') srcs=[{x:0,y:0,q:1}];
  else if(name==='2') srcs=[{x:-0.4,y:0,q:1},{x:0.4,y:0,q:1}];
  else if(name==='d') srcs=[{x:-0.42,y:0,q:1},{x:0.42,y:0,q:-1}];
  else if(name==='3') srcs=[{x:0,y:-0.4,q:1},{x:-0.42,y:0.32,q:1},{x:0.42,y:0.32,q:-1}];
  rebuild();
}
function setPreset(id){ ['e1','e2','ed','e3'].forEach(b=>document.getElementById(b).classList.toggle('on',b===id)); }
document.getElementById('sp').onclick=function(){ sign=1; this.classList.add('on'); document.getElementById('sm').classList.remove('on'); };
document.getElementById('sm').onclick=function(){ sign=-1; this.classList.add('on'); document.getElementById('sp').classList.remove('on'); };
document.getElementById('e1').onclick=()=>{ setPreset('e1'); preset('1'); };
document.getElementById('e2').onclick=()=>{ setPreset('e2'); preset('2'); };
document.getElementById('ed').onclick=()=>{ setPreset('ed'); preset('d'); };
document.getElementById('e3').onclick=()=>{ setPreset('e3'); preset('3'); };
document.getElementById('clr').onclick=()=>{ srcs=[]; setPreset(''); rebuild(); };
document.getElementById('hs').oninput=function(){ HSCALE=+this.value; rebuild(); };

function onResize(){ W=stage.clientWidth; H=stage.clientHeight; camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H); }
window.addEventListener('resize', onResize);

const qs=new URLSearchParams(location.search), pz=qs.get('preset');
if(pz==='1'){ setPreset('e1'); preset('1'); }
else if(pz==='dipole'){ setPreset('ed'); preset('d'); }
else if(pz==='3'){ setPreset('e3'); preset('3'); }
else preset('2');

(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();
</script>
</body>
</html>
