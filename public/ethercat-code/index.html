<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>コードで書くと ── 最小の EtherCAT マスタ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{--bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;--teal:#3c7876;--red:#c2543d;--amber:#c9761f;--blue:#2563aa;--purple:#7a5ea8;--text:#1d1b17;--muted:#7d7568;--faint:#aaa49b;}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;max-width:100%;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;background-image:radial-gradient(circle at 1px 1px,#e9e4da 1px,transparent 0);background-size:22px 22px;}
.wrap{max-width:820px;margin:0 auto;padding:20px 16px 48px;}
header{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.brand{font-weight:700;font-size:22px;line-height:1.1;color:var(--text);}.brand .a{color:var(--teal);}
.tag{font-size:12px;color:var(--muted);padding-bottom:2px;}
.lead{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:16px;font-size:13px;color:#3a3a36;line-height:1.78;box-shadow:0 6px 20px -16px rgba(20,40,40,.4);}
.lead p{margin:0;}.lead b{color:var(--text);}
.card-tool{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 6px 20px -16px rgba(20,40,40,.4);}
.stephead{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;border-bottom:1px solid var(--border);background:var(--surface);}
.stepno{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;color:#fff;background:var(--teal);border-radius:999px;padding:.18rem .6rem;white-space:nowrap;}
.steptitle{font-weight:700;font-size:.92rem;color:var(--text);}
.code{background:#fbf8f2;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.85;overflow-x:auto;border-bottom:1px solid var(--border);}
.ln{display:block;white-space:pre;border-left:3px solid transparent;padding-left:8px;margin-left:-8px;transition:background .2s,opacity .2s,border-color .2s;border-radius:0 4px 4px 0;opacity:.45;}
.ln.on{opacity:1;background:rgba(60,120,118,.10);border-left-color:var(--teal);}
.ln.base{opacity:.8;}
.kw{color:#7a5ea8;}.fn{color:#2563aa;}.str{color:#3c7876;}.num{color:#c9761f;}.cm{color:#aaa49b;font-style:italic;}.op{color:#7d7568;}
.expl{padding:.7rem .9rem;font-size:.82rem;color:#3a3a36;line-height:1.75;background:var(--surface);border-bottom:1px solid var(--border);min-height:3.4rem;}
.expl b{color:var(--text);}.expl code{font-family:'JetBrains Mono',monospace;background:#efe9df;border-radius:3px;padding:0 4px;color:var(--blue);}
.bytes{display:flex;flex-wrap:wrap;gap:6px 4px;padding:.7rem .9rem;align-items:flex-end;background:var(--surface);border-bottom:1px solid var(--border);}
.bgrp{display:flex;flex-direction:column;align-items:center;gap:3px;}
.bcells{display:flex;gap:2px;}
.bc{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#3a3835;background:#fff;border:1px solid #c9b8a8;border-radius:3px;padding:2px 4px;min-width:22px;text-align:center;}
.bgrp .bl{font-size:9px;color:var(--muted);}
.bgrp.hl .bc{border-color:var(--amber);background:#fdf3e3;color:var(--amber);}
.bgrp.hl .bl{color:var(--amber);font-weight:700;}
.ctrl{flex-shrink:0;background:var(--surface);padding:.5rem .7rem;display:flex;gap:.5rem;align-items:center;}
.dots{display:flex;gap:.3rem;align-items:center;}.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:.15s;}.dot.on{background:var(--teal);transform:scale(1.3);}
button{font-family:'Zen Kaku Gothic New',sans-serif;font-size:.78rem;font-weight:700;color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.32rem .8rem;cursor:pointer;transition:.15s;}
button:hover{border-color:var(--teal);}button.pri{background:var(--teal);color:#fff;border-color:var(--teal);}button:disabled{opacity:.4;cursor:default;}
footer{text-align:center;color:var(--faint);font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:12px;}
body.embed{height:100%;display:flex;flex-direction:column;overflow:auto;background-image:none;}
body.embed .wrap{max-width:none;margin:0;padding:0;}
body.embed header,body.embed .lead,body.embed footer{display:none;}
body.embed .card-tool{border:none;border-radius:0;box-shadow:none;}
</style>
</head>
<body>
<div class="wrap">
  <header><div class="brand"><span class="a">コード</span>で書くと</div><div class="tag">最小の EtherCAT マスタ ── 埋めて・送って・読む、それだけ</div></header>
  <div class="lead"><p>「気持ちは分かったけど、どう実装するの？」へ。本物のコード（雰囲気は Python）を1行ずつ。<b>難しい構文は無い</b> ── さっき図で見た「箱を埋めて・送って・読む」が、そのままコードになるだけ。実際は SOEM(C) などのライブラリが下回りをやってくれるけど、芯はこれ。</p></div>
  <div class="card-tool">
    <div class="stephead"><span class="stepno" id="stepno">STEP 1 / 4</span><span class="steptitle" id="steptitle">—</span></div>
    <div class="code" id="code"></div>
    <div class="bytes" id="bytes" style="display:none"></div>
    <div class="expl" id="expl"></div>
    <div class="ctrl"><button id="bPrev">◀ 戻る</button><button id="bNext" class="pri">次へ ▶</button><div class="dots" id="dots"></div></div>
  </div>
  <footer>ブラックボックスを開く — コードとバイトとハードは同じもの</footer>
</div>
<script>
if(window.self!==window.top)document.body.classList.add('embed');
(function(){
  // コード行： s=属するステップ(数字を含む文字列), base=常時うっすら表示
  var LINES=[
    {h:'<span class="kw">import</span> struct',base:1},
    {h:'nic = open_raw_socket(<span class="str">"eth0"</span>)   <span class="cm"># 生イーサのNIC（ライブラリが用意）</span>',base:1},
    {h:'',base:1},
    {h:'<span class="cm"># ① 値を決める ── ただの数</span>',s:'1'},
    {h:'cmd, idx     = <span class="num">0x0C</span>, <span class="num">1</span>          <span class="cm"># 0x0C = LRW（読んで書く）</span>',s:'1'},
    {h:'addr, length = <span class="num">0x1000</span>, <span class="num">3</span>      <span class="cm"># どこに / データ長</span>',s:'1'},
    {h:'outputs = <span class="fn">bytes</span>([<span class="num">0</span>, <span class="num">0</span>, <span class="num">0</span>])      <span class="cm"># 各スレーブへの出力（最初は0）</span>',s:'1'},
    {h:'',base:1},
    {h:'<span class="cm"># ② バイトに詰める（&#39;&lt;&#39; = リトルエンディアン＝下位バイトが先）</span>',s:'2'},
    {h:'header = struct.<span class="fn">pack</span>(<span class="str">&#39;&lt;BBIH&#39;</span>, cmd, idx, addr, length)',s:'2'},
    {h:'frame  = header + outputs + struct.<span class="fn">pack</span>(<span class="str">&#39;&lt;H&#39;</span>, <span class="num">0</span>)   <span class="cm"># 末尾はWKC欄</span>',s:'24'},
    {h:'',base:1},
    {h:'<span class="cm"># ③ 毎周期、回す</span>',s:'3'},
    {h:'<span class="kw">while</span> <span class="kw">True</span>:',s:'3'},
    {h:'    nic.<span class="fn">send</span>(frame)                       <span class="cm"># 送る</span>',s:'3'},
    {h:'    reply = nic.<span class="fn">recv</span>()                    <span class="cm"># 帰りを待つ</span>',s:'3'},
    {h:'    (wkc,) = struct.<span class="fn">unpack</span>(<span class="str">&#39;&lt;H&#39;</span>, reply[<span class="num">-2</span>:])  <span class="cm"># WKC＝何台処理した?</span>',s:'3'},
    {h:'    inputs = reply[<span class="num">8</span>:<span class="num">8</span>+<span class="num">3</span>]                  <span class="cm"># スレーブからの入力</span>',s:'3'},
    {h:'    outputs = <span class="fn">decide_next</span>(inputs)         <span class="cm"># 次の出力を決めて…</span>',s:'3'},
    {h:'    frame   = header + outputs + struct.<span class="fn">pack</span>(<span class="str">&#39;&lt;H&#39;</span>, <span class="num">0</span>)  <span class="cm"># また詰めて、回す</span>',s:'3'}
  ];
  // 結果バイト（②④で表示）
  var BYTES=[
    {bl:'cmd',cs:['0C']},{bl:'idx',cs:['01']},
    {bl:'addr (0x1000)',cs:['00','10','00','00'],hl:true},
    {bl:'len (3)',cs:['03','00'],hl:true},
    {bl:'outputs',cs:['00','00','00']},{bl:'WKC',cs:['00','00']}
  ];
  var STEPS=[
    {t:'値を決める', expl:'まず「<b>何を・どこに・何を出力するか</b>」を、ただの数で決める。<code>0x0C</code>=LRW（読んで書く）、<code>0x1000</code>=論理アドレス、<code>outputs</code>=各スレーブへ送る中身。ここはまだ“設定”。ハードでいう「どのレジスタに何を」と同じ感覚。'},
    {t:'バイトに詰める', bytes:true, expl:'<code>struct.pack</code> が、数を<b>バイト列</b>に変換する。書式の頭の <code>&#39;&lt;&#39;</code> が<b>リトルエンディアン</b>＝下位バイトが先。だから <code>addr=0x1000</code> は <b>00 10 00 00</b> と並ぶ（橙の所）。<code>B</code>=1バイト, <code>I</code>=4バイト, <code>H</code>=2バイト。これが“フレームを組み立てる”＝下のバイトが、さっき図で見た中身そのもの。'},
    {t:'毎周期、回す', expl:'本体はこの <code>while</code> ループだけ：<b>送る → 帰りを待つ → WKC と入力を読む → 次の出力を詰める</b>、を毎周期くり返す。<code>unpack</code> は pack の逆＝バイトを数に戻す。難しい構文はどこにも無い ── “埋めて・送って・読む”の輪が、そのままコードになってる。'},
    {t:'＝さっきの図の正体', bytes:true, expl:'この <code>frame</code> という<b>1本のバイト列</b>が、図で見た「鎖を通り抜けるフレーム」そのもの。── <b>コード（このページ）と、線の上のバイト（下）と、ハードの動き（前の図）は、同じものの“別の顔”</b>だよ。ここまで来れば、SOEM みたいな実装も「あ、芯はこの輪か」と読めるはず。'}
  ];
  var step=0;
  var codeEl=document.getElementById('code'),bytesEl=document.getElementById('bytes'),explEl=document.getElementById('expl');
  var stepno=document.getElementById('stepno'),steptitle=document.getElementById('steptitle'),dotsEl=document.getElementById('dots');
  var bPrev=document.getElementById('bPrev'),bNext=document.getElementById('bNext');

  // コード描画
  LINES.forEach(function(L){var d=document.createElement('span');d.className='ln'+(L.base?' base':'');d.dataset.s=L.s||'';d.innerHTML=L.h||' ';codeEl.appendChild(d);});
  // バイト描画
  BYTES.forEach(function(G){var g=document.createElement('div');g.className='bgrp'+(G.hl?' hl':'');var cc=document.createElement('div');cc.className='bcells';G.cs.forEach(function(v){var c=document.createElement('span');c.className='bc';c.textContent=v;cc.appendChild(c);});var bl=document.createElement('div');bl.className='bl';bl.textContent=G.bl;g.appendChild(cc);g.appendChild(bl);bytesEl.appendChild(g);});
  for(var i=0;i<4;i++){var dt=document.createElement('span');dt.className='dot';dt.addEventListener('click',(function(x){return function(){step=x;render();};})(i));dotsEl.appendChild(dt);}

  function render(){
    var S=String(step+1);
    stepno.textContent='STEP '+(step+1)+' / 4';steptitle.textContent=STEPS[step].t;
    Array.prototype.forEach.call(codeEl.children,function(ln){
      var s=ln.dataset.s||'';ln.classList.toggle('on',s.indexOf(S)>=0);
    });
    bytesEl.style.display=STEPS[step].bytes?'flex':'none';
    explEl.innerHTML=STEPS[step].expl;
    bPrev.disabled=(step===0);bNext.disabled=(step===3);
    for(var i=0;i<dotsEl.children.length;i++)dotsEl.children[i].classList.toggle('on',i===step);
  }
  bPrev.addEventListener('click',function(){if(step>0){step--;render();}});
  bNext.addEventListener('click',function(){if(step<3){step++;render();}});
  render();
})();
</script>
</body>
</html>
