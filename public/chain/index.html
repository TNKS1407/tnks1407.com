<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>ばね玉の鎖 — F=ma から波が生まれる</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f5f2ec;--surface:#faf8f4;--card:#fff;--border:#e3dbd0;
    --accent:#3c7876;--amber:#c9761f;--red:#c2543d;
    --text:#1d1b17;--text-muted:#7d7568;--text-faint:#aaa49b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Zen Kaku Gothic New','Hiragino Sans','Meiryo',system-ui,sans-serif;line-height:1.7;}
  .wrap{max-width:760px;margin:0 auto;padding:14px 14px 22px;}
  section{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:14px 16px 16px;box-shadow:0 1px 6px rgba(29,27,23,.05);}
  .w-title{font-size:1rem;font-weight:700;margin:0 0 .2rem;}
  .w-sub{font-size:.78rem;color:var(--text-muted);margin:0 0 .8rem;line-height:1.6;}
  canvas{display:block;width:100%;border:1px solid var(--border);border-radius:10px;background:var(--surface);cursor:pointer;touch-action:none;}
  .controls{display:flex;flex-wrap:wrap;gap:.5rem .9rem;align-items:center;margin-top:.9rem;}
  .cg{display:flex;align-items:center;gap:.5rem;}
  .cg label{font-size:.74rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted);white-space:nowrap;}
  .cg input[type=range]{width:120px;accent-color:var(--accent);}
  .cg .v{font-size:.74rem;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600;min-width:2ch;}
  .btn{padding:.3rem .7rem;border:1px solid var(--border);border-radius:7px;background:none;
    font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--text-muted);cursor:pointer;transition:.15s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .readout{margin-top:.7rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text);
    background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.55rem .8rem;line-height:1.9;}
  .readout b{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <section>
    <div class="w-title">ばね玉の鎖 — <span style="font-family:'JetBrains Mono',monospace;">F = ma</span> から波が生まれる</div>
    <p class="w-sub">玉（●）をばねで横一列に繋ぎ、両端は壁に固定。各玉はただ運動方程式に従うだけ：隣との<b>ずれの差</b>で引き戻される。「弾く」で真ん中をつまんで離すと、波が左右に走って端で跳ね返る。これは1個1個の F=ma の集まりが、勝手に“波”として振る舞っている姿だよ。「基準モード」を押すと、鎖の固有の揺れ＝前にやった定在波が出る。玉の数 N を増やすほど、つぶつぶがなめらかな波に近づく。</p>
    <canvas id="cv" width="720" height="240"></canvas>
    <div class="controls">
      <div class="cg"><label>玉の数 N</label><input type="range" id="nN" min="3" max="48" step="1" value="24"><span class="v" id="nN-v">24</span></div>
      <button class="btn primary" id="pluck">弾く</button>
      <button class="btn" id="m1">基準モード1</button>
      <button class="btn" id="m2">2</button>
      <button class="btn" id="m3">3</button>
      <button class="btn" id="reset">静止</button>
    </div>
    <div class="readout" id="read"></div>
  </section>
</div>

<script>
(function(){
  var TEAL='#3c7876', AMBER='#c9761f', RED='#c2543d', MUT='#7d7568', FAINT='#cfc9be', SURF='#faf8f4', WALL='#b9b1a4';
  var cv=document.getElementById('cv'), ctx=cv.getContext('2d'), W=cv.width, H=cv.height, MID=H/2;
  var nEl=document.getElementById('nN'), nV=document.getElementById('nN-v'), read=document.getElementById('read');
  var qs=new URLSearchParams(location.search);
  var qn=parseInt(qs.get('n')); var N=(qn>=3&&qn<=48)?qn:24;   // 内部の玉の数（両端の壁は別）
  var k=1, m=1, dt=0.18, sub=6, damp=0.0;
  var y=[], v=[], state='静止', curMode=0;
  var mL=26, mR=W-26, SCALE=40;

  function alloc(){ y=new Array(N+2).fill(0); v=new Array(N+2).fill(0); }
  function rest(){ alloc(); state='静止'; curMode=0; }
  function pluck(){
    alloc(); state='弾いた（波が走る）'; curMode=0;
    var c=(N+1)/2, wdt=Math.max(1.5,(N+1)*0.12);
    for(var i=1;i<=N;i++){ y[i]=1.0*Math.max(0, 1-Math.abs(i-c)/wdt); }
  }
  function mode(mm){
    alloc(); state='基準モード m='+mm; curMode=mm;
    for(var i=1;i<=N;i++){ y[i]=0.9*Math.sin(mm*Math.PI*i/(N+1)); }
  }
  function physStep(){
    for(var s=0;s<sub;s++){
      var a=new Array(N+2).fill(0);
      for(var i=1;i<=N;i++){ a[i]=(k/m)*(y[i+1]-2*y[i]+y[i-1]); }
      for(var j=1;j<=N;j++){ v[j]=(v[j]+a[j]*dt)*(1-damp); }
      for(var p=1;p<=N;p++){ y[p]+=v[p]*dt; }
      y[0]=0; y[N+1]=0; v[0]=0; v[N+1]=0;
    }
  }
  function px(i){ return mL + (mR-mL)*i/(N+1); }
  function py(i){ return MID - y[i]*SCALE; }
  function draw(){
    ctx.clearRect(0,0,W,H); ctx.fillStyle=SURF; ctx.fillRect(0,0,W,H);
    // 中心線
    ctx.strokeStyle='#ece6dc'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,MID); ctx.lineTo(W,MID); ctx.stroke();
    // 壁
    ctx.strokeStyle=WALL; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(mL,MID-46); ctx.lineTo(mL,MID+46); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mR,MID-46); ctx.lineTo(mR,MID+46); ctx.stroke();
    // ばね（線）
    ctx.strokeStyle='rgba(60,120,118,.35)'; ctx.lineWidth=1.4; ctx.beginPath();
    ctx.moveTo(px(0),py(0));
    for(var i=1;i<=N+1;i++){ ctx.lineTo(px(i),py(i)); }
    ctx.stroke();
    // 玉
    for(var j=0;j<=N+1;j++){
      var fixed=(j===0||j===N+1);
      ctx.beginPath(); ctx.arc(px(j),py(j), fixed?3:Math.max(2.2, 60/(N+6)), 0, 2*Math.PI);
      ctx.fillStyle=fixed?WALL:TEAL; ctx.fill();
    }
    // 基準モードなら節を薄く示す
    if(curMode>0){
      for(var q=1;q<curMode;q++){
        var xi=mL+(mR-mL)*(q/curMode);
        ctx.beginPath(); ctx.arc(xi,MID,3,0,2*Math.PI); ctx.fillStyle=FAINT; ctx.fill();
      }
    }
    var note = (curMode>0)
      ? '基準モード <b>m='+curMode+'</b>：腹が '+curMode+' 個の定在波。鎖は形を保って上下に揺れる＝前にやった定在波そのもの。'
      : (state.indexOf('弾')===0
          ? '弾いた山が左右へ走り、壁（固定端）で跳ね返って重なる。これは N 個の F=ma が勝手に作る波だよ。'
          : '「弾く」か「基準モード」を押してみて。');
    read.innerHTML='玉の数 <b>N='+N+'</b>（両端は壁に固定）・状態：<b>'+state+'</b><br>'+note;
  }
  function loop(){ if(cv.offsetParent!==null){ if(state!=='静止') physStep(); } draw(); requestAnimationFrame(loop); }

  // 操作
  nEl.oninput=function(){ N=+nEl.value; nV.textContent=N; rest(); };
  document.getElementById('pluck').onclick=pluck;
  document.getElementById('m1').onclick=function(){ mode(1); };
  document.getElementById('m2').onclick=function(){ mode(2); };
  document.getElementById('m3').onclick=function(){ mode(3); };
  document.getElementById('reset').onclick=rest;
  // キャンバスをクリック/ドラッグで“つまむ”
  function pinch(e){
    var r=cv.getBoundingClientRect(), sx=cv.width/r.width, sy=cv.height/r.height;
    var mx=((e.touches?e.touches[0].clientX:e.clientX)-r.left)*sx;
    var my=((e.touches?e.touches[0].clientY:e.clientY)-r.top)*sy;
    var i=Math.round((mx-mL)/(mR-mL)*(N+1));
    if(i>=1&&i<=N){ y[i]=(MID-my)/SCALE; v[i]=0; state='つまんだ（離すと走る）'; curMode=0; }
  }
  var dragging=false;
  cv.addEventListener('mousedown',function(e){ dragging=true; pinch(e); });
  cv.addEventListener('mousemove',function(e){ if(dragging) pinch(e); });
  window.addEventListener('mouseup',function(){ if(dragging){ dragging=false; if(state.indexOf('つま')===0) state='弾いた（波が走る）'; } });
  cv.addEventListener('touchstart',function(e){ e.preventDefault(); dragging=true; pinch(e); },{passive:false});
  cv.addEventListener('touchmove',function(e){ e.preventDefault(); if(dragging) pinch(e); },{passive:false});
  cv.addEventListener('touchend',function(e){ e.preventDefault(); dragging=false; if(state.indexOf('つま')===0) state='弾いた（波が走る）'; },{passive:false});

  // init（?n=, ?mode=, ?pluck= で初期状態を指定／記事から埋め込み）
  nV.textContent=N;
  var qm=parseInt(qs.get('mode'));
  if(qm>=1&&qm<=3){ mode(qm); }
  else if(qs.get('pluck')!=null){ pluck(); }
  else { rest(); }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
